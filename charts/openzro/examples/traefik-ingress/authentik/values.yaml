fullnameOverride: openzro
management:
  configmap: |-
    {
      "Stuns": [
        {
          "Proto": "udp",
          "URI": "{{ .STUN_SERVER }}",
          "Username": "",
          "Password": ""
        }
      ],
      "TURNConfig": {
        "TimeBasedCredentials": false,
        "CredentialsTTL": "12h0m0s",
        "Secret": "secret",
        "Turns": [
          {
            "Proto": "udp",
            "URI": "{{ .TURN_SERVER }}",
            "Username": "{{ .TURN_SERVER_USER }}",
            "Password": "{{ .TURN_SERVER_PASSWORD }}"
          }
        ]
      },
      "Relay": {
        "Addresses": ["rels://openzro.example.com:443/relay"],
        "CredentialsTTL": "24h",
        "Secret": "{{ .RELAY_PASSWORD }}"
      },
      "Signal": {
        "Proto": "https",
        "URI": "openzro.example.com:443",
        "Username": "",
        "Password": ""
      },
      "Datadir": "/var/lib/openzro/",
      "DataStoreEncryptionKey": "{{ .DATASTORE_ENCRYPTION_KEY }}",
      "HttpConfig": {
        "LetsEncryptDomain": "",
        "CertFile": "",
        "CertKey": "",
        "AuthAudience": "{{ .IDP_CLIENT_ID }}",
        "AuthIssuer": "https://idp.example.com/application/o/openzro/",
        "AuthUserIDClaim": "",
        "AuthKeysLocation": "https://idp.example.com/application/o/openzro/jwks/",
        "OIDCConfigEndpoint": "https://idp.example.com/application/o/openzro/.well-known/openid-configuration",
        "IdpSignKeyRefreshEnabled": false
      },
      "IdpManagerConfig": {
        "ManagerType": "authentik",
        "ClientConfig": {
          "Issuer": "https://idp.example.com/application/o/totmicro-traefik-openzro",
          "TokenEndpoint": "https://idp.example.com/application/o/token/",
          "ClientID": "{{ .IDP_CLIENT_ID }}",
          "ClientSecret": "",
          "GrantType": "client_credentials"
        },
        "ExtraConfig": {
          "Password": "{{ .IDP_SERVICE_ACCOUNT_PASSWORD }}",
          "Username": "{{ .IDP_SERVICE_ACCOUNT_USER }}"
        },
        "Auth0ClientCredentials": null,
        "AzureClientCredentials": null,
        "KeycloakClientCredentials": null,
        "ZitadelClientCredentials": null
      },
      "DeviceAuthorizationFlow": {
        "Provider": "hosted",
        "ProviderConfig": {
          "ClientID": "{{ .IDP_CLIENT_ID }}",
          "ClientSecret": "",
          "Domain": "idp.example.com",
          "Audience": "{{ .IDP_CLIENT_ID }}",
          "TokenEndpoint": "https://idp.example.com/application/o/token/",
          "DeviceAuthEndpoint": "https://idp.example.com/application/o/device/",
          "AuthorizationEndpoint": "",
          "Scope": "openid",
          "UseIDToken": false,
          "RedirectURLs": null
        }
      },
      "PKCEAuthorizationFlow": {
        "ProviderConfig": {
          "ClientID": "{{ .IDP_CLIENT_ID }}",
          "ClientSecret": "",
          "Domain": "",
          "Audience": "{{ .IDP_CLIENT_ID }}",
          "TokenEndpoint": "https://idp.example.com/application/o/token/",
          "DeviceAuthEndpoint": "",
          "AuthorizationEndpoint": "https://idp.example.com/application/o/authorize/",
          "Scope": "openid profile email offline_access api",
          "UseIDToken": false,
          "RedirectURLs": ["http://localhost:53000"]
        }
      },
      "StoreConfig": {
        "Engine": "postgres"
      },
      "ReverseProxy": {
        "TrustedHTTPProxies": null,
        "TrustedHTTPProxiesCount": 0,
        "TrustedPeers": null
      }
    }

  image:
    tag: 0.32.0
  persistentVolume:
    enabled: false
  envFromSecret:
    OPENZRO_STORE_ENGINE_POSTGRES_DSN: openzro/postgresDSN
    STUN_SERVER: openzro/stunServer
    TURN_SERVER: openzro/turnServer
    TURN_SERVER_USER: openzro/turnServerUser
    TURN_SERVER_PASSWORD: openzro/turnServerPassword
    RELAY_PASSWORD: openzro/relayPassword
    IDP_CLIENT_ID: openzro/idpClientID
    IDP_SERVICE_ACCOUNT_USER: openzro/idpServiceAccountUser
    IDP_SERVICE_ACCOUNT_PASSWORD: openzro/idpServiceAccountPassword
    DATASTORE_ENCRYPTION_KEY: openzro/datastoreEncryptionKey

signal:
  image:
    tag: 0.32.0

relay:
  image:
    tag: 0.32.0
  envFromSecret:
    OZ_AUTH_SECRET: openzro/relayPassword
  env:
    OZ_LOG_LEVEL: info
    OZ_LISTEN_ADDRESS: ":33080"
    OZ_EXPOSED_ADDRESS: rels://openzro.example.com:443/relay

dashboard:
  enabled: true
  image:
    tag: v2.9.0
  env:
    # Endpoints
    OPENZRO_MGMT_API_ENDPOINT: https://openzro.example.com:443
    OPENZRO_MGMT_GRPC_API_ENDPOINT: https://openzro.example.com:443
    # OIDC
    AUTH_CLIENT_SECRET:
    AUTH_AUTHORITY: https://idp.example.com/application/o/openzro/
    USE_AUTH0: false
    AUTH_SUPPORTED_SCOPES: openid profile email offline_access api
    AUTH_REDIRECT_URI:
    AUTH_SILENT_REDIRECT_URI:
    OPENZRO_TOKEN_SOURCE: accessToken
    NGINX_SSL_PORT:
    LETSENCRYPT_DOMAIN:
    LETSENCRYPT_EMAIL:
  envFromSecret:
    AUTH_CLIENT_ID: openzro/idpClientID
    AUTH_AUDIENCE: openzro/idpClientID

extraManifests:
  - apiVersion: traefik.io/v1alpha1
    kind: IngressRoute
    metadata:
      name: openzro-traefik
      labels:
        argocd.argoproj.io/instance: openzro-traefik
    spec:
      entryPoints:
      - websecure
      routes:
      - kind: Rule
        match: Host(`openzro.example.com`) && !PathPrefix(`/api`) && !PathPrefix(`/management`) && !PathPrefix(`/signalexchange`) && !PathPrefix(`/relay`)
        services:
        - name: openzro-traefik-dashboard
          namespace: openzro-traefik
          passHostHeader: true
          port: 80
      - kind: Rule
        match: Host(`openzro.example.com`) && PathPrefix(`/api`)
        services:
        - name: openzro-traefik-management
          namespace: openzro-traefik
          passHostHeader: true
          port: 80
      - kind: Rule
        match: Host(`openzro.example.com`) && PathPrefix(`/relay`)
        services:
        - name: openzro-traefik-relay
          namespace: openzro-traefik
          passHostHeader: true
          port: 33080
      - kind: Rule
        match: Host(`openzro.example.com`) && PathPrefix(`/management`)
        services:
        - name: openzro-traefik-management
          namespace: openzro-traefik
          passHostHeader: true
          port: 80
          scheme: h2c
      - kind: Rule
        match: Host(`openzro.example.com`) && PathPrefix(`/signalexchange`)
        services:
        - name: openzro-traefik-signal
          namespace: openzro-traefik
          passHostHeader: true
          port: 80
          scheme: h2c
      tls:
        secretName: openzro-tls
