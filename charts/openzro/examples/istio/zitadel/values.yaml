fullnameOverride: openzro
management:
  configmap: |-
    {
      "Stuns": [
        {
          "Proto": "udp",
          "URI": "{{ .STUN_SERVER }}",
          "Username": "",
          "Password": ""
        }
      ],
      "TURNConfig": {
        "TimeBasedCredentials": false,
        "CredentialsTTL": "12h0m0s",
        "Secret": "secret",
        "Turns": [
          {
            "Proto": "udp",
            "URI": "{{ .TURN_SERVER }}",
            "Username": "{{ .TURN_SERVER_USER }}",
            "Password": "{{ .TURN_SERVER_PASSWORD }}"
          }
        ]
      },
      "Relay": {
        "Addresses": ["rels://openzro.example.com:443/relay"],
        "CredentialsTTL": "24h",
        "Secret": "{{ .RELAY_PASSWORD }}"
      },
      "Signal": {
        "Proto": "https",
        "URI": "openzro.example.com:443",
        "Username": "",
        "Password": ""
      },
      "Datadir": "/var/lib/openzro/",
      "DataStoreEncryptionKey": "{{ .DATASTORE_ENCRYPTION_KEY }}",
      "HttpConfig": {
        "AuthIssuer": "https://zitadel.example.com",
        "AuthAudience": "{{ .IDP_CLIENT_ID }}",
        "OIDCConfigEndpoint": "https://zitadel.example.com/.well-known/openid-configuration",
        "AuthKeysLocation": "https://zitadel.example.com/oauth/v2/keys",
        "LetsEncryptDomain": "",
        "CertFile": "",
        "CertKey": "",
        "AuthUserIDClaim": "",
        "IdpSignKeyRefreshEnabled": true,
        "ExtraAuthAudience": "{{ .IDP_PROJECT_ID }}"
      },
      "IdpManagerConfig": {
        "ManagerType": "zitadel",
        "ClientConfig": {
          "Issuer": "https://zitadel.example.com",
          "TokenEndpoint": "https://zitadel.example.com/oauth/v2/token",
          "ClientID": "{{ .IDP_SERVICE_USER }}",
          "ClientSecret": "{{ .IDP_SERVICE_USER_SECRET }}",
          "GrantType": "client_credentials"
        },
        "ExtraConfig": {
          "ManagementEndpoint": "https://zitadel.example.com/management/v1"
        }
      },
      "DeviceAuthorizationFlow": {
        "Provider": "hosted",
        "ProviderConfig": {
          "ClientID": "{{ .IDP_CLIENT_ID }}",
          "ClientSecret": "",
          "Domain": "zitadel.example.com",
          "Audience": "{{ .IDP_CLIENT_ID }}",
          "TokenEndidpInteractiveClientIDpoint": "https://zitadel.example.com/oauth/v2/token",
          "DeviceAuthEndpoint": "https://zitadel.example.com/oauth/v2/device_authorization",
          "AuthorizationEndpoint": "",
          "Scope": "openid",
          "UseIDToken": false,
          "RedirectURLs": null
        }
      },
      "PKCEAuthorizationFlow": {
        "ProviderConfig": {
          "ClientID": "{{ .IDP_CLIENT_ID }}",
          "ClientSecret": "",
          "Domain": "",
          "Audience": "{{ .IDP_CLIENT_ID }}",
          "DeviceAuthEndpoint": "",
          "Scope": "openid profile email offline_access api groups zitadel:grants",
          "UseIDToken": false,
          "RedirectURLs": ["http://localhost:53000/", "http://localhost:54000/"],
          "TokenEndpoint": "https://zitadel.example.com/oauth/v2/token",
          "AuthorizationEndpoint": "https://zitadel.example.com/oauth/v2/authorize"
        }
      },
      "StoreConfig": {
        "Engine": "sqlite"
      },
      "ReverseProxy": {
        "TrustedHTTPProxies": null,
        "TrustedHTTPProxiesCount": 0,
        "TrustedPeers": null
      }
    }

  image:
    tag: 0.32.0
  persistentVolume:
    enabled: true
    size: 5Gi
  envFromSecret:
    STUN_SERVER: openzro/stunServer
    TURN_SERVER: openzro/turnServer
    TURN_SERVER_USER: openzro/turnServerUser
    TURN_SERVER_PASSWORD: openzro/turnServerPassword
    RELAY_PASSWORD: openzro/relayPassword
    DATASTORE_ENCRYPTION_KEY: openzro/datastoreEncryptionKey
    IDP_SERVICE_USER: openzro/idpServiceUser
    IDP_SERVICE_USER_SECRET: openzro/idpServiceUserSecret
    IDP_PROJECT_ID: openzro/idpProjectID
    IDP_CLIENT_ID: openzro/idpClientID

signal:
  image:
    tag: 0.32.0

relay:
  image:
    tag: 0.32.0
  envFromSecret:
    OZ_AUTH_SECRET: openzro/relayPassword
  env:
    OZ_LOG_LEVEL: info
    OZ_LISTEN_ADDRESS: ":33080"
    OZ_EXPOSED_ADDRESS: rels://openzro.example.com:443/relay

dashboard:
  enabled: true
  image:
    tag: v2.9.0
  env:
    # Endpoints
    OPENZRO_MGMT_API_ENDPOINT: https://openzro.example.com:443
    OPENZRO_MGMT_GRPC_API_ENDPOINT: https://openzro.example.com:443
    # OIDC
    AUTH_AUTHORITY: https://zitadel.example.com
    USE_AUTH0: false
    AUTH_SUPPORTED_SCOPES: openid profile email offline_access api groups
    AUTH_REDIRECT_URI: /nb-auth
    AUTH_SILENT_REDIRECT_URI: /nb-silent-auth
  envFromSecret:
    AUTH_CLIENT_ID: openzro/idpClientID
    AUTH_CLIENT_SECRET: openzro/idpClientSecret
extraManifests:
  - apiVersion: networking.istio.io/v1
    kind: VirtualService
    metadata:
      name: openzro-mgmt
    spec:
      gateways:
        - istio-gw/ext-gw
      hosts:
        - "openzro.example.com"
      http:
        - match:
            - uri:
                prefix: /api
          route:
            - destination:
                host: openzro-management
                port:
                  number: 80
        - match:
            - uri:
                prefix: /management.ManagementService
          route:
            - destination:
                host: openzro-management
                port:
                  number: 80
        - match:
            - uri:
                prefix: /relay
          route:
            - destination:
                host: openzro-relay
                port:
                  number: 33080
        - match:
            - uri:
                prefix: /signalexchange.SignalExchange
          route:
            - destination:
                host: openzro-signal
                port:
                  number: 80
  - apiVersion: networking.istio.io/v1
    kind: VirtualService
    metadata:
      name: openzro-dashboard-mgmt-vs
      namespace: openzro
    spec:
      gateways:
        - istio-gw/ext-gw
      hosts:
        - "openzro-dashboard.example.com"
      http:
        - match:
            - uri:
                prefix: /
          route:
            - destination:
                host: openzro-dashboard
                port:
                  number: 80
