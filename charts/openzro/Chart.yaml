---
apiVersion: v2
name: openzro
description: openZro — open-source mesh networking with WireGuard. Self-hosted control plane (management, signal, relay, dashboard) plus a Dex-based federated IdP (per ADR-0006).
type: application
# Chart version is the chart's own SemVer — bumped on every change to
# the chart even when the appVersion stays the same. Major reset to
# 2.0.0 marks the openZro fork point + the Dex subchart introduction
# (the upstream chart's 1.x line shipped without a bundled IdP).
version: 2.1.0-alpha.67
# Major bump (2.0 → 2.1) marks the HA capability landing: optional
# StatefulSet workloads for management + signal, NATS subchart for
# external-broker mode, and the `cluster.mode` switch (disabled |
# embedded | external) that ties them together. The 2.0 line stays
# usable as `cluster.mode=disabled` (the new default), so existing
# operators upgrade in place without behavior change.
#
# appVersion follows the openzro/openzro tag. alpha.20 ships the
# Claude Design Dex login (forked templates) + shield-based systray
# icons; alpha.21 hotfixes a User.Copy regression; alpha.22 pins
# the cluster locks bucket to MemoryStorage (lab-caught issue with
# memory-only NATS); alpha.69 ships #38 — persistent per-peer posture
# evaluation timeline (backend table + retention worker + dashboard
# Posture tab) plus the MDM/Intune posture-check fixes from alpha.67;
# alpha.70 ships Bug 6 (per-provider refresh interval, operator-set
# from the dashboard, 1-60min) + Bug 3 (cross-replica MDM cache
# fan-out via cluster pub/sub — N-replica clusters now pay ~1/N as
# many vendor API calls); alpha.71 ships cross-replica dedup
# broadcast for the posture-evaluation recorder, collapsing the
# N-duplicate-rows-per-state-change behavior the dashboard surfaced
# in N-replica clusters down to ~1 per change in steady state;
# alpha.74 ships the posture-scheduler follow-ups (single-query
# account discovery replacing the N+1, auto-discovery of accounts
# that gain a schedule after boot with subscribe-retry + reconcile
# debounce, DST transition test coverage) and operator-configurable
# SentinelOne compliance gates (threat threshold, disk encryption,
# firewall, console connectivity, min agent version, sync window)
# behind a baseline-safe default, with the MDM provider config
# moved to a right-edge sheet; alpha.75 ships Control Center v2
# (#39 — one view, four focus tabs, Policy-pivot posture-aware
# topology, in-context policy editor, columnar canvas), the client
# self-update system (#5 — daemon Update RPC + management-driven
# directive with per-peer targeting + R6 critical-only fallback),
# a generic HTTP webhook traffic-event sink with SSRF guard (#40),
# and CI-health stabilization (deterministic reds fixed + the
# Windows/FreeBSD/macOS non-hermetic flakes deflaked); alpha.76
# fixes the dashboard post-login eternal spinner (Next App Router
# segment reconciliation broken by the OIDC lib's native
# history.replaceState — withCustomHistory hard-nav wires it back)
# alongside an OIDC auth-surface sweep (open-redirect guard on the
# new redirect path, drop the SPA-incompatible client_secret
# branch, baseline nginx security headers — HSTS / X-Frame-Options
# / X-Content-Type-Options / Referrer-Policy / Permissions-Policy,
# plaintext-URL warning in production, dev OidcTrustedDomains
# alignment) and tightens the macOS systray icon family to 94%
# canvas fill so the menu-bar glyph stops rendering half-size; CI
# infra cleanup (testcontainers via mirror.gcr.io, env preserved
# through sudo, Docker Hub login removed) closes the rate-limit
# flake; alpha.77 normalises a leading "v" on
# ClientUpdateTargetVersion (operator who pasted the git tag
# verbatim was stuck with a 404 manifest URL), reworks the macOS
# systray badge family to 97% canvas fill with badges ~30% larger
# (source SVGs preserved in brand/macos-menubar/source/ so the
# next geometry tweak is one-liner), and closes the two remaining
# Management Unit / Relay locator races (TestCleanupSchedulingBehaviorIsBatched
# waitgroup ordering, TestLocator_* cluster-dedup convergence)
# plus swaps the testcontainers hub mirror to mirror.gcr.io after
# ECR Public's curated catalog missed postgres:16-alpine/redis:7;
# alpha.78 reworks the macOS systray family to a solid-shield style
# (figure/ground inverted — solid shield with the Z as negative
# space, badges as filled circles with the symbol cut out: X for
# error, ¾ arc for connecting, solid dot for connected, top-right
# pip for update) and ships a dedicated error variant SVG (was
# reusing the disconnected PNG, leaving operators with literally
# identical pixels for two distinct states at 22pt);
# alpha.79 ships TOTP MFA (#31 — opt-in voluntary enrollment +
# per-account enforcement toggles, per-session mfa_session_token
# binding, lockout + backup codes), the SCIM group-membership →
# peers propagation (#104), and the Google Workspace auth pin
# (#82); alpha.80 ships Phase 1+2 of Custom DNS Zones (#108 —
# backend CRUD, agent composition, SearchDomainEnabled flag);
# alpha.81 ships Phase 4 (operator dashboard UI for DNS Zones) +
# Linux client UI stability (stable profile menu, systray flicker
# fix); alpha.82 dashboard polish (sidebar permission gating,
# Control Center gate, OTP modal padding) + macOS systray icon
# cache key fix; alpha.83 finishes the MFA gate so MFAEnforceLocal
# actually triggers on Dex staticPasswords logins (the access
# token doesn't carry federated_claims — extractor now parses the
# connector id out of the Dex `sub` protobuf instead) and
# repaints the last bits of v1 left in the v2 dashboard chrome:
# restricted-user landing on /peers (now shares SetupModalV2 with
# the admin Add Peer modal), the Profile Settings entry that was
# hidden from restricted users (blocking voluntary MFA
# enrollment), the sidebar Overview shown to restricted users
# even though /overview was their 404, plus a single-flight on
# the 403→/mfa/{enroll,challenge} redirect so a fresh login
# under enforcement stops flickering through cancelled
# navigations.
# (alpha.73 was an orphan partial tag superseded before any
# deploy — never chart-bumped.)
appVersion: "0.53.1-alpha.83"
icon: https://raw.githubusercontent.com/openzro/openzro/main/brand/openzro-icon.svg
keywords:
  - vpn
  - wireguard
  - mesh
  - zero-trust
  - networking
home: https://openzro.io/
sources:
  - https://github.com/openzro/openzro
  - https://github.com/openzro/helms
maintainers:
  - name: openZro maintainers
    email: dev@openzro.io

# Subchart deps. Dex is bundled by default (per ADR-0006); operators
# who run an external Dex set `dex.enabled: false` and the dependency
# is skipped. Run `helm dependency update charts/openzro` after
# changing this list.
dependencies:
  - name: dex
    version: 0.23.0
    repository: https://charts.dexidp.io
    condition: dex.enabled
  - name: nats
    version: 1.3.13
    repository: https://nats-io.github.io/k8s/helm/charts/
    condition: nats.enabled
