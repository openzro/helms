---
apiVersion: v2
name: openzro
description: openZro — open-source mesh networking with WireGuard. Self-hosted control plane (management, signal, relay, dashboard) plus a Dex-based federated IdP (per ADR-0006).
type: application
# Chart version is the chart's own SemVer — bumped on every change to
# the chart even when the appVersion stays the same. Major reset to
# 2.0.0 marks the openZro fork point + the Dex subchart introduction
# (the upstream chart's 1.x line shipped without a bundled IdP).
version: 2.0.0-alpha.7
# appVersion follows the openzro/openzro tag. Bumped to 0.53.1-alpha.13
# (alpha.13 is the first GREEN-end-to-end release with all package
# artifacts published to pkg.openzro.io: apt + yum + pacman repos +
# stable URLs at /windows/openzro.msi, /macos/openzro.pkg, latest.json).
appVersion: "0.53.1-alpha.13"
icon: https://raw.githubusercontent.com/openzro/openzro/main/brand/openzro-icon.svg
keywords:
  - vpn
  - wireguard
  - mesh
  - zero-trust
  - networking
home: https://openzro.io/
sources:
  - https://github.com/openzro/openzro
  - https://github.com/openzro/helms
maintainers:
  - name: openZro maintainers
    email: dev@openzro.io

# Subchart deps. Dex is bundled by default (per ADR-0006); operators
# who run an external Dex set `dex.enabled: false` and the dependency
# is skipped. Run `helm dependency update charts/openzro` after
# changing this list.
dependencies:
  - name: dex
    version: 0.23.0
    repository: https://charts.dexidp.io
    condition: dex.enabled
