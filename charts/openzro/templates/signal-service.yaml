{{- if .Values.signal.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "openzro.fullname" . }}-signal
  namespace: {{ include "openzro.namespace" . }}
  labels:
    {{- include "openzro.signal.labels" . | nindent 4 }}
  {{- with .Values.signal.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.signal.service.type }}
  ports:
    - port: {{ .Values.signal.service.port }}
      targetPort: {{ .Values.signal.service.name }}
      protocol: TCP
      name: {{ .Values.signal.service.name }}
      # When signal.tls.enabled=false the binary serves gRPC over
      # HTTP/2 cleartext. Gateway API / Envoy-based controllers read
      # appProtocol to decide upstream framing — h2c forces HTTP/2
      # cleartext, required for gRPC streaming bidi to survive end-to-end.
      {{- if not .Values.signal.tls.enabled }}
      appProtocol: kubernetes.io/h2c
      {{- end }}
    {{- if .Values.signal.metrics.enabled }}
    - port: {{ .Values.signal.metrics.port }}
      targetPort: metrics
      protocol: TCP
      name: metrics
    {{- end }}
  selector:
    {{- include "openzro.signal.selectorLabels" . | nindent 4 }}
  {{- with .Values.signal.service.externalIPs }}
  externalIPs:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
