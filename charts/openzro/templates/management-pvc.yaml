{{- /*
PVC is suppressed in cluster.mode=embedded: each pod runs its own
embedded NATS, the management workload is a StatefulSet, and any
shared on-disk state would fight for a single RWO volume across
replicas. Embedded mode requires Postgres or MySQL anyway (see the
cluster.mode comment block in values.yaml), so /var/lib/openzro
just holds ephemeral runtime artifacts that an emptyDir handles.
*/ -}}
{{- if .Values.management.enabled -}}
{{- if and .Values.management.persistentVolume.enabled (ne (.Values.cluster.mode | default "disabled") "embedded") -}}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "openzro.fullname" . }}-management
  namespace: {{ include "openzro.namespace" . }}
  labels:
    {{- include "openzro.management.labels" . | nindent 4 }}
spec:
  accessModes:
    {{ toYaml .Values.management.persistentVolume.accessModes }}
  {{- if or .Values.management.persistentVolume.storageClass (eq .Values.management.persistentVolume.storageClass "") }}
  storageClassName: "{{ .Values.management.persistentVolume.storageClass }}"
  {{- end }}
  {{- if .Values.management.persistentVolume.existingPVName }}
  volumeName: "{{ .Values.management.persistentVolume.existingPVName }}"
  {{- end }}
  resources:
    requests:
      storage: "{{ .Values.management.persistentVolume.size }}"
{{- end -}}
{{- end -}}
