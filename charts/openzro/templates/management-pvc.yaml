{{- /*
PVC is suppressed whenever cluster.mode is anything other than
`disabled`. Both `embedded` and `external` modes assume HA — multiple
management replicas — and any shared on-disk state would fight for
a single RWO volume (Multi-Attach deadlock; we hit this in the lab
during the v0.53.1-alpha.21 → 2.1.0-alpha.1 upgrade). HA modes
require Postgres or MySQL anyway, so /var/lib/openzro holds only
ephemeral runtime artifacts that an emptyDir handles fine.

In single-instance (`disabled`) mode, the PVC is preserved so sqlite
state survives pod restarts.
*/ -}}
{{- if .Values.management.enabled -}}
{{- if and .Values.management.persistentVolume.enabled (eq (.Values.cluster.mode | default "disabled") "disabled") -}}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "openzro.fullname" . }}-management
  namespace: {{ include "openzro.namespace" . }}
  labels:
    {{- include "openzro.management.labels" . | nindent 4 }}
spec:
  accessModes:
    {{ toYaml .Values.management.persistentVolume.accessModes }}
  {{- if or .Values.management.persistentVolume.storageClass (eq .Values.management.persistentVolume.storageClass "") }}
  storageClassName: "{{ .Values.management.persistentVolume.storageClass }}"
  {{- end }}
  {{- if .Values.management.persistentVolume.existingPVName }}
  volumeName: "{{ .Values.management.persistentVolume.existingPVName }}"
  {{- end }}
  resources:
    requests:
      storage: "{{ .Values.management.persistentVolume.size }}"
{{- end -}}
{{- end -}}
