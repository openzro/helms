{{- /*
   Renders Dex's config.yaml as a Secret when the chart is asked to
   wire an external database for the whole stack (postgres.enabled
   or mysql.enabled). The Dex subchart consumes it via:

       dex:
         configSecret:
           create: false
           name: <release>-dex-config

   The chart's values.yaml comments tell operators to set those
   two lines when they enable an external DB — without them, the
   Dex subchart would create its own ConfigMap from `dex.config`
   (the sqlite default) and ignore this Secret.

   When neither is enabled (the default), this template renders
   nothing — Dex falls back to the upstream chart's self-managed
   config.yaml (sqlite).
*/ -}}
{{- $engine := include "openzro.store.engine" . -}}
{{- if and .Values.dex.enabled $engine -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "openzro.dex.configSecretName" . }}
  namespace: {{ include "openzro.namespace" . }}
  labels:
    {{- include "openzro.common.labels" . | nindent 4 }}
    app.kubernetes.io/component: dex
type: Opaque
stringData:
  # Dex reads this file at startup. The schema mirrors what the
  # upstream `dex/dex` chart emits when configSecret.create=true;
  # only the storage section is rewritten to point at the chosen
  # external DB.
  config.yaml: |
    {{- $cfg := deepCopy .Values.dex.config }}
    {{- if eq $engine "postgres" }}
    {{- $_ := set $cfg "storage" (dict
        "type" "postgres"
        "config" (dict
          "host" .Values.postgres.host
          "port" (.Values.postgres.port | int)
          "database" .Values.postgres.databases.dex
          "user" (include "openzro.postgres.dexUser" .)
          "password" (include "openzro.postgres.dexPassword" .)
          "ssl" (dict "mode" .Values.postgres.sslMode)
        )
    ) }}
    {{- else if eq $engine "mysql" }}
    {{- /*
        Dex's mysql storage uses `host:port` syntax + a separate
        `database` field. SSL is enabled when ssl.mode != "false".
        Map our `tls` modes to Dex's expected ssl.mode values:
          true / preferred   → "preferred"
          skip-verify        → "skip-verify"
          false              → omit ssl block (plaintext)
    */}}
    {{- $sslMode := .Values.mysql.tls -}}
    {{- $storage := dict
        "type" "mysql"
        "config" (dict
          "host" .Values.mysql.host
          "port" (.Values.mysql.port | int)
          "database" .Values.mysql.databases.dex
          "user" (include "openzro.mysql.dexUser" .)
          "password" (include "openzro.mysql.dexPassword" .)
        )
    -}}
    {{- if and (ne (toString $sslMode) "false") $sslMode -}}
    {{- $_ := set (index $storage "config") "ssl" (dict "mode" $sslMode) -}}
    {{- end -}}
    {{- $_ := set $cfg "storage" $storage -}}
    {{- end }}
    {{- $cfg | toYaml | nindent 4 }}
{{- end -}}
