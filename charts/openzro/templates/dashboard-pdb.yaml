{{- if and .Values.dashboard.enabled .Values.dashboard.pdb.enabled (gt (.Values.dashboard.replicaCount | int) 1) -}}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "openzro.fullname" . }}-dashboard
  namespace: {{ include "openzro.namespace" . }}
  labels:
    {{- include "openzro.dashboard.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "openzro.dashboard.selectorLabels" . | nindent 6 }}
  {{- if .Values.dashboard.pdb.maxUnavailable }}
  maxUnavailable: {{ .Values.dashboard.pdb.maxUnavailable }}
  {{- else }}
  minAvailable: {{ .Values.dashboard.pdb.minAvailable }}
  {{- end }}
{{- end -}}
