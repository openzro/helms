{{- /*
Shared HMAC secret authenticating ADR-0014's inter-pod HELLO frames.
Same value on every relay pod; rotated by the operator (in-place
upgrade with a fresh value, then rolling restart).

Render rules:
  - relay.cluster.authSecret.value set → that literal is stored
    (operator manages the value, e.g. via SealedSecrets / vault-csi)
  - relay.cluster.authSecret.existingSecret set → no Secret rendered
    here; the deployment template reads from the operator's own
    Secret directly.
  - otherwise → first install generates randAlphaNum 32; subsequent
    upgrades preserve the value via `lookup` so HELLOs keep
    validating mid-rolling-update.

Only meaningful when the cluster fabric is active. Set
relay.cluster.enabled: false (or run replicaCount: 1 without
cluster.enabled override) to skip the whole subsystem.
*/ -}}
{{- if and .Values.relay.enabled (include "openzro.relay.cluster.enabled" .) -}}
{{- if not .Values.relay.cluster.authSecret.existingSecret -}}
{{- $secretName := include "openzro.relay.cluster.authSecretName" . -}}
{{- $value := "" -}}
{{- if .Values.relay.cluster.authSecret.value -}}
{{-   $value = .Values.relay.cluster.authSecret.value -}}
{{- else -}}
{{-   $existing := lookup "v1" "Secret" (include "openzro.namespace" .) $secretName -}}
{{-   if and $existing $existing.data (index $existing.data "authSecret") -}}
{{-     $value = (index $existing.data "authSecret" | b64dec) -}}
{{-   else -}}
{{-     $value = randAlphaNum 32 -}}
{{-   end -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ include "openzro.namespace" . }}
  labels:
    {{- include "openzro.relay.labels" . | nindent 4 }}
type: Opaque
stringData:
  authSecret: {{ $value | quote }}
{{- end }}
{{- end }}
