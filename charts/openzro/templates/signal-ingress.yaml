{{- if .Values.signal.enabled -}}
{{- if .Values.signal.ingress.enabled -}}
{{- /*
  Signal speaks gRPC exclusively (no HTTP endpoint). The ingress
  controller MUST be told to use HTTP/2 for the backend connection,
  otherwise the gRPC handshake fails with HTTP 426 / 415.

  Required annotation per controller:
    NGINX community:  nginx.ingress.kubernetes.io/backend-protocol: "GRPC"
    NGINX Inc:        nginx.org/grpc-services: "<release>-signal"
    Traefik:          traefik.ingress.kubernetes.io/service.serversscheme: h2c
    HAProxy:          ingress.kubernetes.io/backend-protocol: "h2"

  Example for NGINX community (add under signal.ingress.annotations):
    nginx.ingress.kubernetes.io/backend-protocol: "GRPC"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
*/ -}}
{{- $fullName := printf "%s-signal" (include "openzro.fullname" .) -}}
{{- $svcPort := .Values.signal.service.port -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $fullName }}
  namespace: {{ include "openzro.namespace" . }}
  labels:
    {{- include "openzro.signal.labels" . | nindent 4 }}
  {{- with .Values.signal.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  ingressClassName: {{ .Values.signal.ingress.className }}
  {{- if .Values.signal.ingress.tls }}
  tls:
    {{- range .Values.signal.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    {{- range .Values.signal.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ $fullName }}
                port:
                  number: {{ $svcPort }}
          {{- end }}
    {{- end }}
{{- end }}
{{- end }}
