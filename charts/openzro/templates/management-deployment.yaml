{{- if .Values.management.enabled -}}
{{- $kind := include "openzro.cluster.workloadKind" . -}}
apiVersion: apps/v1
kind: {{ $kind }}
metadata:
  name: {{ include "openzro.fullname" . }}-management
  namespace: {{ include "openzro.namespace" . }}
  {{- with .Values.management.deploymentAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  labels:
    {{- include "openzro.management.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.management.replicaCount }}
  {{- if eq $kind "StatefulSet" }}
  # Embedded NATS clustering needs stable DNS names per pod (so each
  # peer resolves its siblings via the headless service). The pods
  # are otherwise interchangeable — management state lives in the
  # external Postgres/MySQL, not in pod-local disk.
  serviceName: {{ include "openzro.cluster.headlessSvc" (dict "ctx" . "component" "management") }}
  podManagementPolicy: Parallel
  {{- else if eq (.Values.cluster.mode | default "disabled") "external" }}
  # External-broker HA: zero-downtime upgrade. management has no PVC
  # in this mode (chart suppresses it — state lives in Postgres/MySQL),
  # so the Multi-Attach concern that motivated `Recreate` for single-
  # instance is not an issue. RollingUpdate with maxUnavailable=0
  # keeps at least one pod accepting client connections at all times,
  # which avoids the "client lost both manager AND relay during the
  # rollout, gave up reconnecting" scenario hit during the
  # v0.53.1-alpha.25 lab smoke.
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  {{- else }}
  # Recreate by default for cluster.mode=disabled (single-replica). The
  # management daemon mounts /var/lib/openzro from a PVC, and most
  # storage classes (Longhorn, GP3-RWO, NFS-RWO, anything that isn't
  # explicitly RWX) refuse the second pod's volume attach during a
  # rolling upgrade — the new pod hangs on `Multi-Attach error`
  # while the old one keeps running, the deployment never converges,
  # and the operator has to manually delete the old pod to break
  # the deadlock. Recreate avoids the deadlock entirely; downtime
  # during an upgrade is ~3-5s on healthy hardware.
  strategy:
    {{- toYaml .Values.management.strategy | nindent 4 }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "openzro.management.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print .Template.BasePath "/management-cm.yaml") . | sha256sum }}
        {{- with .Values.management.podAnnotations }}
          {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "openzro.management.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.management.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "openzro.management.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.management.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}-management
          securityContext:
            {{- toYaml .Values.management.securityContext | nindent 12 }}
          image: "{{ .Values.management.image.repository }}:{{ .Values.management.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.management.image.pullPolicy }}
          args:
            {{- /* Legacy override path: when management.podCommand.args is
                  non-empty, it takes full control of the command line.
                  Otherwise we render the typed fields (port, logLevel,
                  dnsDomain, …) so individual overrides via --set are
                  cirurgical and stable across chart bumps. */ -}}
            {{- if .Values.management.podCommand.args }}
            {{- range .Values.management.podCommand.args }}
            - {{ . }}
            {{- end }}
            {{- else }}
            - --port={{ .Values.management.port }}
            - --log-file={{ .Values.management.logFile }}
            - --log-level={{ .Values.management.logLevel }}
            - --disable-anonymous-metrics={{ .Values.management.disableAnonymousMetrics }}
            {{- if .Values.management.singleAccountModeDomain }}
            - --single-account-mode-domain={{ .Values.management.singleAccountModeDomain }}
            {{- end }}
            - --dns-domain={{ .Values.management.dnsDomain }}
            {{- range .Values.management.extraArgs }}
            - {{ . }}
            {{- end }}
            {{- end }}
          env:
          {{- /* Shared WireGuard identity (ADR-0011) — every replica reads
                 the same key from the bootstrap-generated Secret. Without
                 this, multi-replica deployments fail decrypt with
                 `InvalidArgument: invalid request message` on ~50 % of
                 peer requests as the K8s Service round-robins them onto
                 a sibling pod that holds a different key. The Secret is
                 created once by the pre-install Helm hook in
                 management-identity-secret.yaml. */}}
            - name: OPENZRO_MGMT_WG_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "openzro.fullname" . }}-management-identity
                  key: wgPrivateKey
                  optional: true
          {{- include "openzro.cluster.env" (dict "ctx" . "component" "management" "replicas" .Values.management.replicaCount) | nindent 12 }}
          {{- /* MaxMind license key — opt-in. When set, management
                 fetches GeoLite2 directly from download.maxmind.com
                 instead of pkg.openzro.io. Three sources in order:
                 inline value (chart-managed Secret), existing
                 Secret reference, or unset (use openZro mirror). */}}
          {{- include "openzro.management.maxmindEnv" . | nindent 12 }}
          {{- /* Auto-wired DSNs for the 3 SQL stores (data, flow, activity)
                  when postgres.enabled or mysql.enabled. Operators can still
                  override via management.envRaw below — K8s applies env in
                  order and the LAST entry with a given name wins. */}}
          {{- include "openzro.management.autoWiredEnv" . | nindent 12 }}
          {{- range $key, $val := .Values.management.env }}
            - name: {{ $key }}
              value: {{ $val | quote }}
          {{- end }}
          {{- if .Values.management.envRaw }}
            {{- with .Values.management.envRaw }}
              {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- end }}
          {{- range $key, $val := .Values.management.envFromSecret }}
            - name: {{ $key }}
              valueFrom:
                secretKeyRef:
                  name: {{ (split "/" $val)._0 }}
                  key: {{ (split "/" $val)._1 }}
          {{- end }}
          {{- with .Values.management.lifecycle }}
          lifecycle: {{ toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.management.containerPort }}
              protocol: TCP
            - name: grpc
              containerPort: {{ .Values.management.grpcContainerPort }}
              protocol: TCP
            - name: metrics
              containerPort: {{ .Values.management.metrics.port }}
              protocol: TCP
          {{- if eq $kind "StatefulSet" }}
            # Embedded NATS — client port for in-pod connections,
            # cluster port for peer routing across StatefulSet replicas.
            - name: nats-client
              containerPort: {{ .Values.cluster.embedded.clientPort }}
              protocol: TCP
            - name: nats-cluster
              containerPort: {{ .Values.cluster.embedded.clusterPort }}
              protocol: TCP
          {{- end }}
          {{- if .Values.management.livenessProbe }}
            {{- with .Values.management.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- end }}
          {{- if .Values.management.readinessProbe }}
            {{- with .Values.management.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- end }}
          resources:
            {{- toYaml .Values.management.resources | nindent 12 }}
          volumeMounts:
            - mountPath: /etc/openzro
              name: config
            - mountPath: /var/lib/openzro
              name: management
          {{- if .Values.management.volumeMounts }}
          {{- .Values.management.volumeMounts | toYaml | nindent 12 }}
          {{- end }}
      {{- with .Values.management.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.management.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.management.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "openzro.fullname" . }}-management
        - name: management
          {{- /* PVC mount only when cluster.mode=disabled (single-
                 instance). HA modes (embedded/external) suppress the
                 PVC to avoid Multi-Attach across replicas — shared
                 state lives in Postgres/MySQL by contract. */}}
          {{- if and .Values.management.persistentVolume.enabled (eq (.Values.cluster.mode | default "disabled") "disabled") }}
          persistentVolumeClaim:
            claimName: {{ include "openzro.fullname" . }}-management
          {{- else }}
          emptyDir: {}
          {{- end }}
          {{- if  .Values.management.volumes }}
          {{- .Values.management.volumes | toYaml | nindent 8 }}
          {{- end }}
{{- end -}}
