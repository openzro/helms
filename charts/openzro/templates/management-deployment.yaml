{{- if .Values.management.enabled -}}

apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "openzro.fullname" . }}-management
  namespace: {{ include "openzro.namespace" . }}
  {{- with .Values.management.deploymentAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  labels:
    {{- include "openzro.management.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.management.replicaCount }}
  # Recreate by default (overridable via management.strategy). The
  # management daemon mounts /var/lib/openzro from a PVC, and most
  # storage classes (Longhorn, GP3-RWO, NFS-RWO, anything that isn't
  # explicitly RWX) refuse the second pod's volume attach during a
  # rolling upgrade — the new pod hangs on `Multi-Attach error`
  # while the old one keeps running, the deployment never converges,
  # and the operator has to manually delete the old pod to break
  # the deadlock. Recreate avoids the deadlock entirely; downtime
  # during an upgrade is ~3-5s on healthy hardware (single-replica
  # by design — multi-replica HA needs the embedded NATS path,
  # which is a separate switch).
  strategy:
    {{- toYaml .Values.management.strategy | nindent 4 }}
  selector:
    matchLabels:
      {{- include "openzro.management.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print .Template.BasePath "/management-cm.yaml") . | sha256sum }}
        {{- with .Values.management.podAnnotations }}
          {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "openzro.management.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.management.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "openzro.management.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.management.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}-management
          securityContext:
            {{- toYaml .Values.management.securityContext | nindent 12 }}
          image: "{{ .Values.management.image.repository }}:{{ .Values.management.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.management.image.pullPolicy }}
          {{- if hasKey .Values.management.podCommand "args" }}
          args:
            {{- range .Values.management.podCommand.args }}
            - {{ . }}
          {{- end }}
          {{- end }}
          {{- if or (.Values.management.env) (.Values.management.envRaw) (.Values.management.envFromSecret) }}
          env:
          {{- range $key, $val := .Values.management.env }}
            - name: {{ $key }}
              value: {{ $val | quote }}
          {{- end }}
          {{- if .Values.management.envRaw }}
            {{- with .Values.management.envRaw }}
              {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- end }}
          {{- range $key, $val := .Values.management.envFromSecret }}
            - name: {{ $key }}
              valueFrom:
                secretKeyRef:
                  name: {{ (split "/" $val)._0 }}
                  key: {{ (split "/" $val)._1 }}
          {{- end }}
          {{- end }}
          {{- with .Values.management.lifecycle }}
          lifecycle: {{ toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.management.containerPort }}
              protocol: TCP
            - name: grpc
              containerPort: {{ .Values.management.grpcContainerPort }}
              protocol: TCP
            - name: metrics
              containerPort: {{ .Values.management.metrics.port }}
              protocol: TCP
          {{- if .Values.management.livenessProbe }}
            {{- with .Values.management.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- end }}
          {{- if .Values.management.readinessProbe }}
            {{- with .Values.management.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- end }}
          resources:
            {{- toYaml .Values.management.resources | nindent 12 }}
          volumeMounts:
            - mountPath: /etc/openzro
              name: config
            - mountPath: /var/lib/openzro
              name: management
          {{- if .Values.management.volumeMounts }}
          {{- .Values.management.volumeMounts | toYaml | nindent 12 }}
          {{- end }}
      {{- with .Values.management.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.management.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.management.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "openzro.fullname" . }}-management
        - name: management
          {{- if .Values.management.persistentVolume.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "openzro.fullname" . }}-management
          {{- else }}
          emptyDir: {}
          {{- end }}
          {{- if  .Values.management.volumes }}
          {{- .Values.management.volumes | toYaml | nindent 8 }}
          {{- end }}
{{- end -}}
