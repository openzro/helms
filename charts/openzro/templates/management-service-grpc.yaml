{{- /*
   Service de gRPC do management (porta 33073). Sempre criado quando
   management.enabled=true — antes era gateado pela flag legacy
   `useBackwardsGrpcService` que coexistia com a flag homonima do
   Ingress, criando um caso patologico: a Ingress (default false → port 80)
   apontava para um Service que nao existia (default false), e mesmo
   quando o Ingress foi corrigido em alpha.28 ainda batia em 503
   porque o Service exigia opt-in. Sempre criar.
*/ -}}
{{- if .Values.management.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "openzro.fullname" . }}-management-grpc
  namespace: {{ include "openzro.namespace" . }}
  labels:
    {{- include "openzro.management.labels" . | nindent 4 }}
  {{- with .Values.management.serviceGrpc.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.management.serviceGrpc.type }}
  ports:
    - port: {{ .Values.management.serviceGrpc.port }}
      targetPort: {{ .Values.management.serviceGrpc.name }}
      protocol: TCP
      name: {{ .Values.management.serviceGrpc.name }}
      # Gateway API / Envoy-based controllers (kgateway, Envoy Gateway,
      # GKE Gateway) read appProtocol to decide upstream framing. With
      # kubernetes.io/h2c the proxy speaks HTTP/2 cleartext to the pod —
      # required for gRPC streaming to work end-to-end. Without this,
      # some controllers default to HTTP/1.1 and break bidi RPCs.
      appProtocol: kubernetes.io/h2c
  selector:
    {{- include "openzro.management.selectorLabels" . | nindent 4 }}
  {{- with .Values.management.serviceGrpc.externalIPs }}
  externalIPs:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
