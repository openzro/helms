{{- if .Values.signal.enabled -}}
{{- $kind := include "openzro.cluster.workloadKind" . -}}
apiVersion: apps/v1
kind: {{ $kind }}
metadata:
  name: {{ include "openzro.fullname" . }}-signal
  namespace: {{ include "openzro.namespace" . }}
  {{- with .Values.signal.deploymentAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  labels:
    {{- include "openzro.signal.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.signal.replicaCount }}
  {{- if eq $kind "StatefulSet" }}
  serviceName: {{ include "openzro.cluster.headlessSvc" (dict "ctx" . "component" "signal") }}
  podManagementPolicy: Parallel
  {{- end }}
  selector:
    matchLabels:
      {{- include "openzro.signal.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.signal.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "openzro.signal.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.signal.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "openzro.signal.serviceAccountName" . }}
      terminationGracePeriodSeconds: {{ .Values.signal.terminationGracePeriodSeconds }}
      securityContext:
        {{- toYaml .Values.signal.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}-signal
          securityContext:
            {{- toYaml .Values.signal.securityContext | nindent 12 }}
          image: "{{ .Values.signal.image.repository }}:{{ .Values.signal.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.signal.image.pullPolicy }}
          args:
            - "--port"
            - "{{ .Values.signal.service.port }}"
            - "--log-level"
            - "{{ .Values.signal.logLevel }}"
            - "--log-file"
            - "console"
          env:
          {{- include "openzro.cluster.env" (dict "ctx" . "component" "signal" "replicas" .Values.signal.replicaCount) | nindent 12 }}
          ports:
            - name: grpc
              containerPort: {{ .Values.signal.containerPort }}
              protocol: TCP
            - name: metrics
              containerPort: {{ .Values.signal.metrics.port }}
              protocol: TCP
          {{- if eq $kind "StatefulSet" }}
            - name: nats-client
              containerPort: {{ .Values.cluster.embedded.clientPort }}
              protocol: TCP
            - name: nats-cluster
              containerPort: {{ .Values.cluster.embedded.clusterPort }}
              protocol: TCP
          {{- end }}
          {{- if .Values.signal.livenessProbe }}
            {{- with .Values.signal.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- end }}
          {{- if .Values.signal.readinessProbe }}
            {{- with .Values.signal.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- end }}
          {{- if .Values.signal.startupProbe }}
            {{- with .Values.signal.startupProbe }}
          startupProbe:
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- end }}
          resources:
            {{- toYaml .Values.signal.resources | nindent 12 }}
          {{- if .Values.signal.volumeMounts }}
          volumeMounts:
          {{- .Values.signal.volumeMounts | toYaml | nindent 12 }}
          {{- end }}
      {{- if  .Values.signal.volumes }}
      volumes:
      {{- .Values.signal.volumes | toYaml | nindent 8 }}
      {{- end }}
      {{- with .Values.signal.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.signal.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.signal.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}

{{- end }}
