{{- if .Values.ingress.enabled -}}
{{- /*
  Consolidated Ingress — dashboard (/), Dex (/dex), and optionally
  management HTTP (/api) — all on the same hostname and TLS certificate.

  Path ordering (most-specific first, required by NGINX community):
    1. /dex        → Dex          (no rewrite — Dex uses the prefix for asset URLs)
    2. /api        → Management   (optional; no rewrite — daemon serves at /api/v1/...)
    3. /           → Dashboard    (catch-all)

  ⚠ Do NOT add path-rewrite annotations (rewrite-target, use-regex).
  Dex derives all asset URL prefixes from issuerURL.Path — stripping /dex
  breaks login page CSS/JS. No other path here needs rewriting either.

  ⚠ NGINX community ingress does not support the same hostname across
  multiple Ingress resources. Enable ingress.management.enabled: true
  to include the management HTTP API here instead of management-ingress.yaml.

  Intentionally excluded from this Ingress:
    management gRPC — requires backend-protocol:GRPC annotation (HTTP/2 only),
                      incompatible with the HTTP paths above; use
                      management-ingress-grpc.yaml on a separate hostname.
    signal          — gRPC only, separate hostname.
    relay           — TCP, not HTTP; separate hostname/port.
*/ -}}
{{- $dashSvc  := printf "%s-dashboard"  (include "openzro.fullname" .) -}}
{{- $dashPort := .Values.dashboard.service.port -}}
{{- $dexSvc   := printf "%s-dex" .Release.Name -}}
{{- $dexPort  := (((.Values.dex).service).ports).http.port | default 5556 -}}
{{- $mgmtSvc  := printf "%s-management" (include "openzro.fullname" .) -}}
{{- $mgmtPort := .Values.management.service.port -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "openzro.fullname" . }}
  namespace: {{ include "openzro.namespace" . }}
  labels:
    {{- include "openzro.common.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- toYaml .Values.ingress.tls | nindent 4 }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          {{- if .Values.dex.enabled }}
          - path: {{ .Values.ingress.dex.path }}
            pathType: {{ .Values.ingress.dex.pathType }}
            backend:
              service:
                name: {{ $dexSvc }}
                port:
                  number: {{ $dexPort }}
          {{- end }}
          {{- if and .Values.management.enabled .Values.ingress.management.enabled }}
          - path: {{ .Values.ingress.management.path }}
            pathType: {{ .Values.ingress.management.pathType }}
            backend:
              service:
                name: {{ $mgmtSvc }}
                port:
                  number: {{ $mgmtPort }}
          {{- end }}
          {{- if .Values.dashboard.enabled }}
          - path: {{ .Values.ingress.dashboard.path }}
            pathType: {{ .Values.ingress.dashboard.pathType }}
            backend:
              service:
                name: {{ $dashSvc }}
                port:
                  number: {{ $dashPort }}
          {{- end }}
{{- end -}}
