{{- if .Values.management.enabled -}}
{{- /*
   When postgres.enabled or mysql.enabled, override the StoreConfig
   section of the operator-supplied management.json so the engine
   matches the top-level db block. The operator's raw configmap
   stays the source for everything else (Signal/Relay/HttpConfig/etc.)
   — we only swap the storage stanza so flipping engines on/off
   doesn't require duplicating connection details in two places.

   The DSN itself is NOT rendered into the configmap (which is
   plaintext). The management daemon reads it from
   OPENZRO_STORE_ENGINE_<engine>_DSN, which the operator must set
   via management.envFromSecret pointing at a Secret they manage.
*/ -}}
{{- $engine := include "openzro.store.engine" . -}}
{{- $cfg := .Values.management.configmap | fromJson -}}
{{- if $engine -}}
  {{- $_ := set $cfg "StoreConfig" (dict "Engine" $engine) -}}
{{- end -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "openzro.fullname" . }}-management
  namespace: {{ include "openzro.namespace" . }}
  labels:
    {{- include "openzro.management.labels" . | nindent 4 }}
data:
  management.json: |-
    {{- $cfg | toJson | nindent 4 }}
{{- end -}}
