{{- /*
   gRPC Ingress para o management. Aponta SEMPRE para o Service gRPC
   (porta `management.serviceGrpc.port`, default 33073) — NGINX com
   `backend-protocol: GRPC` envia HTTP/2 frames, e o Service HTTP
   (porta 80) responde HTTP/1 → 502 Bad Gateway com content-type text/html.

   A flag legacy `management.useBackwardsGrpcService` foi removida em
   2.1.0-alpha.28 — operadores que querem apontar para outro Service/porta
   sobrescrevem via `management.ingressGrpc.backendService` /
   `management.ingressGrpc.backendPort`.
*/ -}}
{{- if .Values.management.enabled -}}
{{- if .Values.management.ingressGrpc.enabled -}}
{{- $fullName := printf "%s-management-grpc" (include "openzro.fullname" .) -}}
{{- $svcName := .Values.management.ingressGrpc.backendService | default (printf "%s-management-grpc" (include "openzro.fullname" .)) -}}
{{- $svcPort := .Values.management.ingressGrpc.backendPort | default .Values.management.serviceGrpc.port -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $fullName }}
  namespace: {{ include "openzro.namespace" . }}
  labels:
    {{- include "openzro.management.labels" . | nindent 4 }}
  {{- with .Values.management.ingressGrpc.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  ingressClassName: {{ .Values.management.ingressGrpc.className }}
  {{- if .Values.management.ingressGrpc.tls }}
  tls:
    {{- range .Values.management.ingressGrpc.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    {{- range .Values.management.ingressGrpc.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ $svcName }}
                port:
                  number: {{ $svcPort }}
          {{- end }}
    {{- end }}
{{- end }}
{{- end }}
