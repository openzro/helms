{{- /*
  Chart-managed Secret for the database password used by the management
  daemon and the Dex subchart.

  Created only when:
    - postgres.enabled OR mysql.enabled is true
    - AND the operator did NOT set existingSecret (they manage credentials
      externally via Vault / SealedSecrets / ESO / sops)
    - AND a password value is provided inline

  The Secret stores a single key "password". The autoWiredEnv helper
  references it via secretKeyRef and injects it as OPENZRO_DB_PASSWORD,
  which is then referenced by $(OPENZRO_DB_PASSWORD) inside the DSN
  env vars via Kubernetes dependent env var substitution.

  Operators who manage secrets externally set:
    postgres.existingSecret: my-pg-secret        # Secret name
    postgres.existingSecretPasswordKey: password  # key within the Secret
  (or the mysql equivalents) and leave postgres.password empty.
*/ -}}
{{- $pg := and .Values.postgres .Values.postgres.enabled -}}
{{- $my := and .Values.mysql .Values.mysql.enabled -}}

{{- if $pg -}}
{{- if and (not .Values.postgres.existingSecret) .Values.postgres.password -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "openzro.fullname" . }}-db
  namespace: {{ include "openzro.namespace" . }}
  labels:
    {{- include "openzro.common.labels" . | nindent 4 }}
type: Opaque
stringData:
  password: {{ .Values.postgres.password | quote }}
{{- end -}}
{{- end -}}

{{- if $my -}}
{{- if and (not .Values.mysql.existingSecret) .Values.mysql.password -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "openzro.fullname" . }}-db
  namespace: {{ include "openzro.namespace" . }}
  labels:
    {{- include "openzro.common.labels" . | nindent 4 }}
type: Opaque
stringData:
  password: {{ .Values.mysql.password | quote }}
{{- end -}}
{{- end -}}
