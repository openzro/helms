{{- if .Values.dashboard.enabled -}}

apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "openzro.fullname" . }}-dashboard
  namespace: {{ include "openzro.namespace" . }}
  {{- with .Values.dashboard.deploymentAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  labels:
    {{- include "openzro.dashboard.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.dashboard.replicaCount }}
  selector:
    matchLabels:
      {{- include "openzro.dashboard.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.dashboard.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "openzro.dashboard.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.dashboard.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "openzro.dashboard.serviceAccountName" . }}
      terminationGracePeriodSeconds: {{ .Values.dashboard.terminationGracePeriodSeconds }}
      securityContext:
        {{- toYaml .Values.dashboard.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          {{- if .Values.dashboard.podCommand.args }}
          command: ["/bin/sh", "-c"]
          args:
            {{- range .Values.dashboard.podCommand.args }}
            - {{ . }}
          {{- end }}
          {{- end }}
          securityContext:
            {{- toYaml .Values.dashboard.securityContext | nindent 12 }}
          image: "{{ .Values.dashboard.image.repository }}:{{ .Values.dashboard.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.dashboard.image.pullPolicy }}
          {{- if or (.Values.dashboard.env) (.Values.dashboard.envRaw) (.Values.dashboard.envFromSecret) }}
          env:
          {{- range $key, $val := .Values.dashboard.env }}
            - name: {{ $key }}
              value: {{ $val | quote }}
          {{- end }}
          {{- if .Values.dashboard.envRaw }}
            {{- with .Values.dashboard.envRaw }}
              {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- end }}
          {{- range $key, $val := .Values.dashboard.envFromSecret }}
            - name: {{ $key }}
              valueFrom:
                secretKeyRef:
                  name: {{ (split "/" $val)._0 }}
                  key: {{ (split "/" $val)._1 }}
          {{- end }}
          {{- end }}
          {{- with .Values.dashboard.lifecycle }}
          lifecycle: {{ toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.dashboard.containerPort }}
              protocol: TCP
          {{- if .Values.dashboard.livenessProbe }}
            {{- with .Values.dashboard.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- end }}
          {{- if .Values.dashboard.readinessProbe }}
            {{- with .Values.dashboard.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- end }}
          {{- if .Values.dashboard.startupProbe }}
            {{- with .Values.dashboard.startupProbe }}
          startupProbe:
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- end }}
          resources:
            {{- toYaml .Values.dashboard.resources | nindent 12 }}
          {{- /*
            Volumes nginx — necessários por causa do user split do nginx
            Alpine (master root → workers `nginx`) e do filesystem read-only
            que pode estar em vigor por padrão. Sempre montados; usuários
            podem adicionar mais via dashboard.volumeMounts.
          */}}
          volumeMounts:
            - name: nginx-tmp
              mountPath: /var/lib/nginx/tmp
            - name: nginx-log
              mountPath: /var/log/nginx
            - name: nginx-run
              mountPath: /run/nginx
          {{- with .Values.dashboard.volumeMounts }}
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: nginx-tmp
          emptyDir: {}
        - name: nginx-log
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}
      {{- with .Values.dashboard.volumes }}
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.dashboard.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.dashboard.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.dashboard.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
