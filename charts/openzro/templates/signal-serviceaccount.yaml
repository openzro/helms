{{- if .Values.signal.enabled -}}

{{- if .Values.signal.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "openzro.signal.serviceAccountName" . }}
  namespace: {{ include "openzro.namespace" . }}
  labels:
    {{- include "openzro.signal.labels" . | nindent 4 }}
  {{- with .Values.signal.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: false
{{- end }}
{{- end }}
