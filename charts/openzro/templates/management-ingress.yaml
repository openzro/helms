{{- if .Values.management.enabled -}}
{{- /*
  ⚠ NGINX community ingress does not support the same hostname across
  multiple Ingress resources. If dashboard and management share a hostname,
  enable ingress.management.enabled instead of this resource — the
  consolidated ingress.yaml places all paths in a single Ingress object.
  This file is only needed when management uses a different hostname or
  when the operator prefers per-component Ingress resources (non-NGINX
  controllers or NGINX Inc with merging support).
*/ -}}
{{- if .Values.management.ingress.enabled -}}
{{- $fullName := printf "%s-management" (include "openzro.fullname" .) -}}
{{- $svcPort := .Values.management.service.port -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $fullName }}
  namespace: {{ include "openzro.namespace" . }}
  labels:
    {{- include "openzro.management.labels" . | nindent 4 }}
  {{- with .Values.management.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  ingressClassName: {{ .Values.management.ingress.className }}
  {{- if .Values.management.ingress.tls }}
  tls:
    {{- range .Values.management.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    {{- range .Values.management.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ $fullName }}
                port:
                  number: {{ $svcPort }}
          {{- end }}
    {{- end }}
{{- end }}
{{- end }}
