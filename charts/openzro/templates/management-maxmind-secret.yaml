{{- /*
Chart-managed Secret holding the MaxMind GeoLite2 license key. Only
rendered when management.geoLite.licenseKey.value is set explicitly
in values — most operators leave that empty and either skip the
feature or supply their own Secret via geoLite.licenseKey.existingSecret.

When set, management-deployment.yaml wires OZ_MAXMIND_LICENSE_KEY
via secretKeyRef, so the value is never visible in `kubectl get
deploy -o yaml`. Compatible with SealedSecrets, sops, etc., as long
as the operator stores the literal in values.
*/ -}}
{{- if and .Values.management.enabled .Values.management.geoLite -}}
{{- $g := .Values.management.geoLite -}}
{{- $lk := $g.licenseKey | default dict -}}
{{- if and $lk.value (not $lk.existingSecret) -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "openzro.fullname" . }}-management-maxmind
  namespace: {{ include "openzro.namespace" . }}
  labels:
    {{- include "openzro.management.labels" . | nindent 4 }}
type: Opaque
stringData:
  licenseKey: {{ $lk.value | quote }}
{{- end }}
{{- end }}
