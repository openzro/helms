{{- /*
Pre-install/upgrade hook that ensures a Kubernetes Secret containing the
management daemon's WireGuard private key exists in the release
namespace BEFORE management pods boot. See ADR-0011 in the openZro
repo for the full rationale.

Why a hook instead of a regular template:
  - Helm renders all templates client-side, so a `randAlphaNum` here
    would pin the key to the rendered manifests in `helm get manifest`
    output — surprising failure mode if anyone re-renders or diffs.
  - We need the key to be generated ONCE (first install) and reused on
    every subsequent upgrade. A pre-install hook + `helm.sh/hook-delete-policy:
    before-hook-creation` does that natively without `lookup` (which is
    flaky inside `helm template` and during pull-style operators).

The hook runs `wg genkey` in a tiny alpine image with `wireguard-tools`,
then `kubectl patch` the Secret into existence iff it does not exist.
Subsequent runs short-circuit and exit 0.

Bare-metal operators using this chart on K3s/k3d on a single node get
the same shape — the hook becomes idempotent and runs once. Operators
who pre-create the Secret (e.g. via SealedSecrets, vault-csi, or just
sealed manually for compliance) skip the hook entirely because we
short-circuit if the Secret already exists.

For HA: every management replica reads from the same Secret via the
OPENZRO_MGMT_WG_PRIVATE_KEY env var (wired in management-deployment.yaml).
*/ -}}
{{- if .Values.management.enabled -}}
{{- $secretName := printf "%s-management-identity" (include "openzro.fullname" .) -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $secretName }}-bootstrap
  namespace: {{ include "openzro.namespace" . }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ $secretName }}-bootstrap
  namespace: {{ include "openzro.namespace" . }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-9"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ $secretName }}-bootstrap
  namespace: {{ include "openzro.namespace" . }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-8"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
subjects:
  - kind: ServiceAccount
    name: {{ $secretName }}-bootstrap
    namespace: {{ include "openzro.namespace" . }}
roleRef:
  kind: Role
  name: {{ $secretName }}-bootstrap
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ $secretName }}-bootstrap
  namespace: {{ include "openzro.namespace" . }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 2
  template:
    metadata:
      labels:
        {{- include "openzro.management.labels" . | nindent 8 }}
        app.kubernetes.io/component: bootstrap
    spec:
      serviceAccountName: {{ $secretName }}-bootstrap
      restartPolicy: OnFailure
      containers:
        - name: bootstrap
          image: alpine/k8s:1.30.4
          command:
            - sh
            - -c
            - |
              set -e
              NS={{ include "openzro.namespace" . }}
              if kubectl -n "$NS" get secret {{ $secretName }} >/dev/null 2>&1; then
                echo "secret {{ $secretName }} already present, leaving it untouched"
                exit 0
              fi
              apk add --no-cache wireguard-tools >/dev/null
              KEY=$(wg genkey)
              kubectl -n "$NS" create secret generic {{ $secretName }} \
                --from-literal=wgPrivateKey="$KEY"
              echo "generated and stored {{ $secretName }}"
{{- end }}
