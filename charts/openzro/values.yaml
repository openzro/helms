## @section openZro Relay Parameters

relay:
  ## @param relay.enabled Enable or disable the openZro relay component.
  ##
  enabled: true

  ## @param relay.replicaCount Number of relay pod replicas.
  ##
  replicaCount: 1

  ## PodDisruptionBudget — auto-enabled when replicaCount > 1.
  ## @param relay.pdb.enabled Enable PodDisruptionBudget for relay.
  ## @param relay.pdb.minAvailable Minimum available pods during disruption.
  ## @param relay.pdb.maxUnavailable Maximum unavailable pods (mutually exclusive with minAvailable).
  pdb:
    enabled: true
    minAvailable: 1
    maxUnavailable: ""

  ## @param relay.logLevel Log level for the relay component.
  ##
  logLevel: info

  ## @param relay.env Environment variables for the management pod.
  ##
  env: {}

  ## @param relay.envRaw Raw environment variables for the management pod.
  ##
  envRaw: []

  ## @param relay.envFromSecret Environment variables from secrets.
  ##
  envFromSecret: {}
  #ENV_VAR: secretName/secretKey

  image:
    ## @param relay.image.repository Docker image repository for the relay component.
    ##
    repository: ghcr.io/openzro/relay

    ## @param relay.image.pullPolicy Docker image pull policy for the relay component.
    ##
    pullPolicy: IfNotPresent

    ## @param relay.image.tag Docker image tag for the relay component.
    ##
    tag: ""

  ## @param relay.imagePullSecrets Docker registry credentials for pulling the relay image.
  ##
  imagePullSecrets: []

  serviceAccount:
    ## @param relay.serviceAccount.create Whether to create a service account for the relay component.
    ##
    create: true

    ## @param relay.serviceAccount.annotations Annotations for the relay service account.
    ##
    annotations: {}

    ## @param relay.serviceAccount.name Name of the relay service account.
    ##
    name: ""

  ## @param relay.deploymentAnnotations Annotations for the relay deployment.
  ##
  deploymentAnnotations: {}

  ## @param relay.podAnnotations Annotations for the relay pod(s).
  ##
  podAnnotations: {}

  ## @param relay.podSecurityContext Security context for the relay pod(s).
  ##
  podSecurityContext: {}
  # fsGroup: 2000

  ## @param relay.securityContext Security context for the relay container.
  ##
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    seccompProfile:
      type: RuntimeDefault
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 65534
  # runAsUser: 1000

  metrics:
    ## @param signal.metrics.enabled enables/disables metrics
    ##
    enabled: false
    ## @param signal.metrics.port target metrics port
    ##
    port: 9090

  ## @param relay.containerPort Container port for the relay service.
  ##
  containerPort: 33080

  ## ADR-0014 inter-pod fabric. The relay binary opens a second TCP
  ## listener on `cluster.port` for sibling pods to forward traffic
  ## destined to peers connected to a different pod. A dedicated
  ## Headless Service (clusterIP: None) advertises every relay pod's
  ## IP so each pod can resolve siblings and dial back.
  cluster:
    ## @param relay.cluster.enabled Force inter-pod fabric on/off. `null` (default)
    ## auto-enables when relay.replicaCount > 1 and disables at 1 — the right
    ## default for both fresh installs and operators bumping replicas. Set to
    ## `true` to force on (e.g. during a single-replica chaos test) or `false`
    ## to keep the fabric off even with multiple replicas (legacy behaviour:
    ## peers on different pods can't talk; rely on sticky-session LB).
    ##
    enabled: null

    ## @param relay.cluster.port TCP port the relay listens on for inter-pod
    ## traffic. Same value on every pod. The Headless Service publishes this
    ## port; pods discover each other via DNS and dial `<ip>:<port>`.
    ## 7090 matches relay/server/cluster.DefaultInterpodPort.
    ##
    port: 7090

    ## Inter-pod HELLO authentication. The relay binary stamps an HMAC-SHA256
    ## over each HELLO so a pod that can dial port 7090 but doesn't know the
    ## secret is rejected at handshake. Three configuration paths:
    ##   - Leave both fields empty: chart auto-generates a random 32-char value
    ##     on first install and preserves it across upgrades via `lookup`.
    ##     Recommended for self-contained installs.
    ##   - Set authSecret.value: chart stores that literal in a managed Secret.
    ##     Use this with SealedSecrets, sops, or chart-rendered GitOps when
    ##     the value is owned upstream.
    ##   - Set authSecret.existingSecret: chart reads from your own Secret,
    ##     skipping the chart-managed Secret entirely. Pair with
    ##     existingSecretKey to override the default key name.
    ##
    authSecret:
      ## @param relay.cluster.authSecret.value Literal HMAC secret to store. Empty = auto-gen.
      value: ""
      ## @param relay.cluster.authSecret.existingSecret Use a pre-existing Secret. Empty = chart-managed.
      existingSecret: ""
      ## @param relay.cluster.authSecret.existingSecretKey Key inside existingSecret. Defaults to "authSecret".
      existingSecretKey: ""

  ## @param relay.publicHostname Public hostname (or IP) used to build the rel:// address
  ## advertised to peers via the management daemon config.
  ## Example: relay.example.com
  ## When empty and management.config.relay.addresses is also empty, no relay address
  ## is injected — set this or management.config.relay.addresses explicitly.
  ## Must match the SAN of relay.tls when TLS is enabled (otherwise WireGuard peers
  ## reject the rels:// handshake).
  ##
  publicHostname: ""

  ## TLS termination on the relay listener. The relay binary supports four cert
  ## sources (file-based, Let's Encrypt HTTP-01, Let's Encrypt DNS-01 via Route53,
  ## or none). The chart only wires the file-based path — combine with cert-manager
  ## (idiomatic K8s) or any external Cert pipeline that ships a tls-typed Secret.
  ##
  ## Two ways to feed the cert:
  ##
  ##   1) certManager.enabled=true → chart renders a cert-manager Certificate CRD
  ##      pointing at an existing (Cluster)Issuer. cert-manager populates the Secret;
  ##      the relay deployment mounts it. Renewal is automatic.
  ##
  ##   2) certManager.enabled=false + existingSecret=<your-secret> → chart consumes
  ##      a Secret you manage out-of-band (kubectl create secret tls, GitOps Cert
  ##      pipeline, sealed-secrets, etc).
  ##
  ## When tls.enabled=false, the relay listens plaintext and the management config
  ## advertises rel:// instead of rels://. Use only in lab/private-fabric setups.
  ##
  tls:
    ## @param relay.tls.enabled Wire TLS into the relay listener.
    ## When true the chart sets OZ_TLS_CERT_FILE / OZ_TLS_KEY_FILE on the pod and
    ## flips the management-side rel:// scheme to rels://.
    ##
    enabled: false

    ## @param relay.tls.existingSecret Name of a tls-typed Secret to mount.
    ## Only consulted when certManager.enabled=false. When certManager.enabled=true,
    ## the chart resolves the Secret name from certManager.secretName (or derives
    ## a default).
    ##
    existingSecret: ""

    secretKeys:
      ## @param relay.tls.secretKeys.cert Key inside the Secret holding the certificate.
      cert: tls.crt
      ## @param relay.tls.secretKeys.key  Key inside the Secret holding the private key.
      key: tls.key

    ## @param relay.tls.mountPath Directory inside the relay pod where the Secret is mounted.
    ## The pod env points OZ_TLS_CERT_FILE / OZ_TLS_KEY_FILE at <mountPath>/<secretKeys.*>.
    ##
    mountPath: /etc/openzro-relay/tls

    certManager:
      ## @param relay.tls.certManager.enabled Render a cert-manager Certificate CRD
      ## pointing at an existing (Cluster)Issuer. Requires cert-manager already
      ## installed in the cluster. The chart never creates Issuers — those are
      ## cluster-wide and operator-owned (typically letsencrypt-prod / letsencrypt-staging).
      ##
      enabled: false

      issuerRef:
        ## @param relay.tls.certManager.issuerRef.kind ClusterIssuer (cluster-scoped) or Issuer (namespace-scoped).
        kind: ClusterIssuer
        ## @param relay.tls.certManager.issuerRef.name Name of the existing (Cluster)Issuer.
        ## Required when certManager.enabled=true.
        name: ""

      ## @param relay.tls.certManager.duration Cert validity. Default 90d (Let's Encrypt max).
      duration: 2160h
      ## @param relay.tls.certManager.renewBefore Renew this far ahead of expiry. Default 15d.
      renewBefore: 360h

      ## @param relay.tls.certManager.dnsNames SANs for the Certificate.
      ## When empty, falls back to [relay.publicHostname]. Set explicitly for multi-SAN
      ## (e.g. [relay.example.com, relay-eu.example.com]).
      dnsNames: []

      ## @param relay.tls.certManager.secretName Name of the Secret cert-manager populates.
      ## When empty, defaults to "<release>-relay-tls". The relay deployment
      ## mounts this Secret automatically — no extra wiring needed.
      ##
      secretName: ""

      ## @param relay.tls.certManager.privateKey Private key options for the Certificate.
      ## See cert-manager docs (algorithm, encoding, size, rotationPolicy).
      privateKey: {}
      # algorithm: RSA
      # size: 2048
      # rotationPolicy: Always

      ## @param relay.tls.certManager.annotations Extra annotations for the Certificate CRD.
      annotations: {}

  service:
    ## @param relay.service.type Service type for the relay component.
    ## The relay uses a persistent TCP (WebSocket) connection — Ingress is NOT supported.
    ## Use LoadBalancer (cloud) or NodePort (bare-metal) to expose port relay.service.port
    ## directly. ClusterIP is the default; change to LoadBalancer for production.
    ##
    type: ClusterIP

    ## @param relay.service.port Port for the relay component (TCP). Exposed publicly
    ## when service.type is LoadBalancer or NodePort. Must match the port in rel:// addresses.
    ##
    port: 33080

    ## @param relay.service.name Name for the relay service port.
    ##
    name: http

    ## @param relay.service.externalIPs External IPs for the relay service.
    ##
    externalIPs: []

    ## @param relay.service.annotations Annotations for the relay service.
    ##
    annotations: {}

  ## @param relay.resources Resource requests and limits for the relay pod.
  ##
  resources: {}
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

  ## @param relay.nodeSelector Node selector for scheduling the relay pod.
  ##
  nodeSelector: {}

  ## @param relay.tolerations Tolerations for scheduling the relay pod.
  ##
  tolerations: []

  ## @param relay.affinity Affinity rules for scheduling the relay pod.
  ##
  affinity: {}

  ## @param relay.terminationGracePeriodSeconds Seconds to wait for graceful shutdown (active WireGuard relay sessions).
  ##
  terminationGracePeriodSeconds: 60

  ## @param relay.livenessProbe for the relay component.
  ##
  ## httpGet em /metrics (porta `metrics`/9090, HTTP plaintext) em vez
  ## de tcpSocket em `http`/33080. O port `http` serve TLS (rels://) e
  ## probe TCP gera log noise — "http: TLS handshake error from ... EOF" —
  ## a cada poll. O metrics server sempre roda no relay (mesmo quando
  ## relay.metrics.enabled=false controla apenas exposure no Service).
  livenessProbe:
    failureThreshold: 3
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 3
    httpGet:
      path: /metrics
      port: metrics

  ## @param relay.readinessProbe for the relay component.
  ##
  readinessProbe:
    failureThreshold: 3
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 3
    httpGet:
      path: /metrics
      port: metrics

  ## @param relay.startupProbe for the relay component.
  ##
  startupProbe:
    failureThreshold: 15
    initialDelaySeconds: 5
    periodSeconds: 5
    timeoutSeconds: 3
    httpGet:
      path: /metrics
      port: metrics

  ## @param relay.volumeMounts Volume mounts for the relay pod.
  volumeMounts: []
  # - name: tmp
  #   mountPath: /tmp

  ## @param relay.volumes volumes for the relay pod.
  volumes: []
  # - name: tmp
  #   emptyDir: {}

dashboard:
  ## @param dashboard.enabled Enable or disable the openZro dashboard component.
  ##
  enabled: true

  ## @param management.podCommand Define the arguments for the management pod.
  ##
  podCommand:
    args: []
    #  - sed -i 's/listen \[\:\:\]\:80 default_server\;//g' /etc/nginx/http.d/default.conf && /usr/bin/supervisord -c /etc/supervisord.conf

