    annotations: {}

    ## @param serviceAccount.name The name of the service account to use.
    # If not set and create is true, a name is generated using the fullname
    # template
    name: ""

  ## @param dashboard.deploymentAnnotations Annotations for the dashboard deployment.
  ##
  deploymentAnnotations: {}

  ## @param dashboard.podAnnotations Annotations for pods
  ## ref:
  ## https://kubernetes.io/docs/concepts/overview/working-with-objects/annotations/
  podAnnotations: {}

  ## Configure Pods Security Context
  ## ref:
  ## https://kubernetes.io/docs/tasks/configure-pod-container/security-context/#set-the-security-context-for-a-pod
  ## @param podSecurityContext
  ## fsGroup=101 corresponde ao group `nginx` na imagem (Alpine, gid 101).
  ## Necessário para que os volumes (logs/tmp/pid em emptyDir) fiquem
  ## chowned para o group nginx — caso contrário os workers (gid 101)
  ## não conseguem escrever nos emptyDirs vindo do chart.
  podSecurityContext:
    fsGroup: 101

  ## Configure Container Security Context
  ## ref:
  ## https://kubernetes.io/docs/tasks/configure-pod-container/security-context/#set-the-security-context-for-a-pod
  ## @param dashboard.securityContext
  ## nginx precisa de quatro capabilities além de drop=[ALL]:
  ##   CHOWN            — chown dos tmp dirs para o user nginx
  ##   SETUID + SETGID  — master forka workers como user `nginx`
  ##   NET_BIND_SERVICE — bind em porta privilegiada (:80)
  ## Sem isso o pod fica em CrashLoopBackOff com "operation not permitted".
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
      add:
        - CHOWN
        - SETUID
        - SETGID
        - NET_BIND_SERVICE
    seccompProfile:
      type: RuntimeDefault
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 65534

  ## @param dashboard.containerPort
  containerPort: 80

  service:
    ## @param dashboard.service.type Service type for the dashboard component.
    ##
    type: ClusterIP

    ## @param dashboard.service.port Port for the dashboard service.
    ##
    port: 80

    ## @param dashboard.service.name Name for the dashboard service port.
