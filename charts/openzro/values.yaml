    ## (currently 0.53.1-alpha.1) so `helm install` always pulls the
    ## dashboard image matching the openzro/openzro core release.
    tag: ""

  ## @param imagePullSecrets image pull secrets
  imagePullSecrets: []

  serviceAccount:
    ## @param dashboard.serviceAccount.create Specifies whether a service account should be
    ## created
    create: true

