## @section Global Parameters

## @param global.namespace Kubernetes namespace for the openZro components.
##
global:
  namespace: ""

## @section Consolidated Ingress
##
## Single Ingress resource that routes dashboard (/) and Dex (/dex) on the
## same hostname — the standard openZro layout. Eliminates the need to
## repeat host, className, TLS, and annotations across three separate blocks.
##
## When enabled, set individual dashboard.ingress.enabled and
## dex.ingress.enabled to false to avoid duplicate rules on the same host.
##
## Components that stay on separate Ingress resources (different protocol
## or host):
##   management HTTP  → management.ingress  (path rewrite conflicts with Dex)
##   management gRPC  → management.ingressGrpc
##   signal           → signal.ingress
##   relay            → relay.service.type: LoadBalancer  (TCP; Ingress is not supported)
##
ingress:
  ## @param ingress.enabled Enable the consolidated dashboard+Dex Ingress.
  enabled: false

  ## @param ingress.className Ingress class name (e.g. nginx, traefik).
  className: ""

  ## @param ingress.host Public hostname for dashboard and Dex (e.g. vpn.acme.com).
  ## Also used as the primary source for management.json host derivations when set.
  host: ""

  ## @param ingress.annotations Annotations applied to the consolidated Ingress.
  ## Do NOT add path-rewrite annotations — Dex requires the /dex prefix intact.
  ## Example for NGINX community:
  ##   nginx.ingress.kubernetes.io/ssl-redirect: "true"
  ##   nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
  annotations: {}

  ## @param ingress.tls TLS configuration. One entry covers both dashboard and Dex.
  ## Example:
  ##   - secretName: openzro-tls
  ##     hosts:
  ##       - vpn.acme.com
  tls: []

  dashboard:
    ## @param ingress.dashboard.path Path for the dashboard. Matched before Dex.
    path: /
    ## @param ingress.dashboard.pathType Path type for the dashboard route.
    pathType: Prefix

  dex:
    ## @param ingress.dex.path Path for Dex. Must match the path in dex.config.issuer.
    ## Do not add a rewrite annotation — Dex uses this prefix for all asset URLs.
    path: /dex
    ## @param ingress.dex.pathType Path type for the Dex route.
    pathType: Prefix

  management:
    ## @param ingress.management.enabled Include management HTTP in the consolidated Ingress.
    ## Recommended when using NGINX community ingress — avoids duplicate-hostname conflicts
    ## that arise from having management-ingress.yaml and ingress.yaml on the same host.
    ## The management gRPC endpoint still requires its own Ingress (management-ingress-grpc.yaml)
    ## because the backend-protocol:GRPC annotation cannot coexist with HTTP paths.
    enabled: false
    ## @param ingress.management.path Path prefix for the management REST API.
    ## The management daemon serves its API at /api/v1/... so no path rewriting is needed —
    ## requests arriving at /api are forwarded as-is and matched by the daemon's router.
    path: /api
    ## @param ingress.management.pathType Path type for the management route.
    pathType: Prefix

## @param nameOverride Override the name of the chart.
##
nameOverride: ""

## @param fullnameOverride Override the full name of the chart.
##
fullnameOverride: ""

## ============================================================
## External database — single-source-of-truth for the stack.
## ============================================================
##
## openZro talks to the management database AND Dex's database. Two
## drivers are supported, both as bring-your-own-database (the chart
## never installs a DBMS):
##
##   postgres  — recommended for HA/prod
##   mysql     — supported alternative for shops already running MySQL
##
## Pick AT MOST ONE; setting `enabled: true` on both is rejected by
## the chart at template time.
##
## When enabled, the chart wires the chosen DB into:
##   * management.StoreConfig.Engine in management.json
##   * Dex's storage (rendered into a Secret, consumed via
##     dex.configSecret.create=false + dex.configSecret.name=...)
##
## Both services hit the same SERVER but separate DATABASES
## (separation of concerns + per-service credentials via the
## optional `overrides` block).
##
## With BOTH disabled (default), each component falls back to its
## own sqlite — fine for dev/lab, NOT recommended for prod or any
## HA deployment (sqlite is single-process; multi-replica management
## or Dex on sqlite diverges silently).
##
## Migration: when switching engines or flipping enabled=true on an
## existing sqlite deployment, plan the data migration yourself
## (pg_dump / mysqldump → import). The chart does NOT migrate data.
##
postgres:
  ## @param postgres.enabled Use Postgres for management state, flow events, activity events, and Dex storage. Set to true for HA / prod.
  enabled: false

  ## @param postgres.host Postgres hostname or IP.
  host: ""

  ## @param postgres.port Postgres port.
  port: 5432

  ## @param postgres.sslMode Postgres SSL mode (require | verify-ca | verify-full | disable).
  sslMode: require

  ## @param postgres.username Postgres username with access to ALL FOUR databases below.
  ## Override per-component via `postgres.overrides.<component>.username` if you
  ## prefer separate credentials per service.
  username: openzro

  ## @param postgres.password Postgres password. Vault-encrypt in real inventories.
  password: ""

  databases:
    ## @param postgres.databases.management Database for the management daemon (accounts, peers, policies, mdm, flow_exports config).
    management: openzro
    ## @param postgres.databases.flow Database for the per-packet flow events HOT tier (high write volume, monthly partitions).
    flow: openzro_flow
    ## @param postgres.databases.activity Database for the audit / activity events log (low write volume).
    activity: openzro_activity
    ## @param postgres.databases.dex Database for the Dex IdP.
    dex: dex

  ## Pre-install Job that provisions the four databases on the target
  ## Postgres before the management Deployment comes up. Idempotent —
  ## checks pg_database before each CREATE so re-runs are safe.
  ##
  ## Disabled by default. Enable when the runtime user has CREATEDB
  ## privilege OR you provide a separate bootstrap credential below.
  ## Operators who pre-create the DBs themselves leave this off.
  provisioning:
    ## @param postgres.provisioning.enabled Run a pre-install Job that creates the 4 databases listed above.
    enabled: false
    ## @param postgres.provisioning.username Optional bootstrap username (must have CREATEDB). Falls back to postgres.username when empty.
    username: ""
    ## @param postgres.provisioning.password Optional bootstrap password. Falls back to postgres.password when empty.
    password: ""
    ## @param postgres.provisioning.image Image used by the provisioning Job. Defaults to the official Postgres client.
    image: postgres:16-alpine

  ## @param postgres.existingSecret Name of a pre-existing Secret containing the Postgres password.
  ## When set, postgres.password is ignored and the password is read from this Secret.
  ## The chart-managed <release>-db Secret is not created.
  ## Use with Vault, SealedSecrets, ESO, or sops. Pair with existingSecretPasswordKey.
  existingSecret: ""

  ## @param postgres.existingSecretPasswordKey Key inside existingSecret that holds the password. Defaults to "password".
  existingSecretPasswordKey: ""

  ## Per-component credential overrides — uncomment if you want a
  ## dedicated Postgres user for Dex (or any other component).
  ## Most teams keep a single user with access to both DBs.
  # overrides:
  #   dex:
  #     username: dex
  #     password: ""

mysql:
  ## @param mysql.enabled Use MySQL for management state, flow events, activity events, and Dex storage. Mutually exclusive with postgres.enabled.
  ##
  ## ⚠️  PARTITIONING NOTE — neither the flow events nor the activity
  ## events store can use MySQL native partitioning (it's
  ## non-declarative `ALTER TABLE … PARTITION BY RANGE` that the GORM
  ## migration path cannot express). Retention falls back to row-level
  ## DELETE. At activity-event scale (10³–10⁴ rows/day) that's fine.
  ## At flow-event scale (10⁶–10⁸ rows/day) DELETE + binlog cost grows
  ## non-trivially — Postgres is recommended for production. The
  ## management binary logs a Warn at boot when flow store is on
  ## MySQL/SQLite. See [docs/adr/0002-flow-events-storage.md] for the
  ## full trade-off matrix.
  ##
  enabled: false

  ## @param mysql.host MySQL hostname or IP.
  host: ""

  ## @param mysql.port MySQL port.
  port: 3306

  ## @param mysql.tls MySQL TLS mode (true | false | skip-verify | preferred).
  ## Maps to the go-sql-driver `tls` query parameter. Use "preferred" if your
  ## server speaks TLS but you don't want to verify the certificate.
  tls: preferred

  ## @param mysql.username MySQL username with access to ALL FOUR databases below.
  ## Override per-component via `mysql.overrides.<component>.username`.
  username: openzro

  ## @param mysql.password MySQL password. Vault-encrypt in real inventories.
  password: ""

  databases:
    ## @param mysql.databases.management Database for the management daemon (accounts, peers, policies, mdm, flow_exports config).
    management: openzro
    ## @param mysql.databases.flow Database for the per-packet flow events HOT tier (high write volume).
    flow: openzro_flow
    ## @param mysql.databases.activity Database for the audit / activity events log (low write volume).
    activity: openzro_activity
    ## @param mysql.databases.dex Database for the Dex IdP.
    dex: dex

  ## Pre-install Job that provisions the four databases on the target
  ## MySQL before the management Deployment comes up. Idempotent — uses
  ## `CREATE DATABASE IF NOT EXISTS`.
  ##
  ## Disabled by default. Enable when the runtime user has CREATE
  ## privilege OR you provide a separate bootstrap credential below.
  provisioning:
    ## @param mysql.provisioning.enabled Run a pre-install Job that creates the 4 databases listed above.
    enabled: false
    ## @param mysql.provisioning.username Optional bootstrap username with CREATE privilege. Falls back to mysql.username when empty.
    username: ""
    ## @param mysql.provisioning.password Optional bootstrap password. Falls back to mysql.password when empty.
    password: ""
    ## @param mysql.provisioning.image Image used by the provisioning Job. Defaults to the official MySQL client.
    image: mysql:8.0

  ## @param mysql.existingSecret Name of a pre-existing Secret containing the MySQL password.
  ## When set, mysql.password is ignored and the password is read from this Secret.
  ## The chart-managed <release>-db Secret is not created.
  existingSecret: ""

  ## @param mysql.existingSecretPasswordKey Key inside existingSecret that holds the password. Defaults to "password".
  existingSecretPasswordKey: ""

  ## Per-component credential overrides.
  # overrides:
  #   dex:
  #     username: dex
  #     password: ""

## ============================================================
## Cluster coordination — required for HA (multi-replica) deployments.
## ============================================================
##
## Management and signal use a cluster broker (NATS) for two things:
##
##   1. Distributed locks — `cluster.Coordinator` in management
##      serializes per-account / per-peer mutations across replicas
##      via JetStream KV. Without a broker, two pods can both try to
##      mutate the same account and corrupt state.
##
##   2. Signal pub/sub — when more than one signal-server is up,
##      peers may register on different pods. The dispatcher uses
##      NATS subjects (`oz.signal.peer.<peerID>`) so any pod can
##      route a message to a peer attached to a sibling pod.
##
## Three modes are supported:
##
##   disabled  — single instance, no broker. management.replicaCount
##               and signal.replicaCount must stay 1. This is the
##               default and matches the v0.53.x lab + small prod
##               profile.
##
##   embedded  — each management/signal pod runs an embedded NATS
##               server (single binary, no external dep). The chart
##               flips the workload kind from Deployment to
##               StatefulSet, adds a headless service for stable
##               peer DNS, and wires `OPENZRO_BROKER=embedded` +
##               `OPENZRO_CLUSTER_PEERS` automatically. Postgres or
##               MySQL is required for management state — sqlite is
##               single-process only.
##
##   external  — connect to a NATS deployment provisioned outside
##               this chart (or via the `nats` subchart, see below).
##               Workloads stay as Deployment, so no PVC-per-pod
##               and rolling upgrades work normally. Recommended
##               profile for prod: simpler upgrade story, NATS HA
##               handled by its own chart.
##
## See [docs/adr/0006-dex-idp.md] and [cluster/factory/factory.go]
## for the binary-side env contract.
##
cluster:
  ## @param cluster.mode Cluster broker mode. One of `disabled`, `embedded`, `external`.
  mode: disabled

  ## When `mode=external` and you do NOT use the `nats` subchart
  ## bundled below, set this to your existing NATS URL.
  ## When `mode=external` AND `nats.enabled=true`, leave empty —
  ## the chart auto-derives `nats://<release>-nats:4222`.
  external:
    ## @param cluster.external.url NATS connection URL when mode=external and not using the nats subchart.
    url: ""

  embedded:
    ## @param cluster.embedded.clientPort Embedded NATS client port (where management/signal connect locally).
    clientPort: 4222

    ## @param cluster.embedded.clusterPort Embedded NATS cluster routes port (peer-to-peer).
    clusterPort: 6222

    jetstream:
      ## @param cluster.embedded.jetstream.storage JetStream storage. `memory` (recommended for HA: locks + pub/sub
      ## are short-lived state, no correctness loss on pod restart) or `file` (requires RWX storageClass + sizeGiB).
      storage: memory

      ## @param cluster.embedded.jetstream.sizeGiB JetStream PVC size in GiB. Only used when storage=file.
      sizeGiB: 1

      ## @param cluster.embedded.jetstream.storageClass storageClass for the JetStream PVC. Only used when storage=file.
      storageClass: ""

## @section openZro Management

management:
  ## @param management.enabled Enable or disable openZro management component.
  ##
  enabled: true

  ## @param management.port Port the management gRPC + HTTP server listens on inside the pod.
  ##
  port: 80

  ## @param management.logFile Where the management daemon writes logs (`console` recommended).
  ##
  logFile: console

  ## @param management.logLevel Log verbosity (panic | fatal | error | warn | info | debug | trace).
  ##
  logLevel: info

  ## @param management.disableAnonymousMetrics Disable anonymous usage metrics. Recommended for production.
  ##
  disableAnonymousMetrics: false

  ## @param management.singleAccountModeDomain Email domain that maps every user to a single account.
  ## Set to your OAuth/Dex email domain (e.g. acme.com) for single-tenant clusters.
  ## Empty disables single-account mode and forces multi-account login.
  ##
  singleAccountModeDomain: openzro.selfhosted

  ## @param management.dnsDomain Mesh DNS zone the openZro client claims authority over on each peer.
  ##
  ## ⚠️  CRITICAL — must NOT overlap with the management/dashboard public hostname.
  ## If `dnsDomain` equals the management FQDN (or is its parent zone), the local DNS
  ## proxy on every peer will return NXDOMAIN for the management hostname → peers
  ## cannot reconnect after any blackout, all kernel WireGuard sessions drop with
  ## "Required key not available". The dashboard validator rejects this at the
  ## per-account `settings.dns_domain` level too.
  ##
  ## Good: `mesh.fuseone.io` (subdomain of your apex), `oz.local`, `openzro.selfhosted`.
  ## Bad : `openzro.fuseone.io` if that's where management lives.
  ##
  dnsDomain: openzro.selfhosted

  ## @param management.extraArgs Additional CLI flags appended to the typed args above.
  ## Use for flags the chart hasn't promoted yet (e.g. `--metrics-port=9090`).
  ##
  extraArgs: []

  ## GeoLite2 / MaxMind geolocation database. The management binary
  ## auto-fetches GeoLite2 on cold boot so the country / city posture-
  ## check dropdowns populate without operator action. Default source
  ## is the openZro mirror at pkg.openzro.io; operators who prefer
  ## fetching directly from MaxMind set a license key (free at
  ## https://www.maxmind.com/en/geolite2/signup).
  ##
  geoLite:
    licenseKey:
      ## @param management.geoLite.licenseKey.value MaxMind license key as a literal.
      ## Stored in a chart-managed Secret and mounted as
      ## OZ_MAXMIND_LICENSE_KEY. Use SealedSecrets/sops upstream of
      ## the values file in production.
      value: ""

      ## @param management.geoLite.licenseKey.existingSecret Pre-existing Secret name.
      ## Skips the chart-managed Secret entirely; pair with
      ## existingSecretKey to override the default key name.
      existingSecret: ""

      ## @param management.geoLite.licenseKey.existingSecretKey Key inside existingSecret. Defaults to "licenseKey".
      existingSecretKey: ""

  ## @param management.podCommand Legacy raw args override.
  ##
  ## DEPRECATED. When `args` is non-empty, takes full control of the pod's
  ## command line and IGNORES the typed `port`/`logLevel`/`dnsDomain`/etc.
  ## above. Existing deployments that override individual flags via
  ## `--set management.podCommand.args[N]=…` should migrate to the typed
  ## fields — overriding by array index is fragile and was the source of
  ## the v0.53.1-alpha.30 lab incident where a wrong dnsDomain at index 5
  ## broke peer reconnect cluster-wide.
  ##
  podCommand:
    args: []

  ## @section Management daemon config (management.json)
  ##
  ## These values render into /etc/openzro/management.json inside the
  ## management pod. Fields left empty ("") or as empty lists ([]) are
  ## auto-derived from other chart values when a derivation rule exists:
  ##
  ##   signal.uri              ← management.ingress.hosts[0].host + ":443"
  ##   relay.addresses         ← "rel://" + relay.publicHostname + ":<relay port>"
  ##   httpConfig.authIssuer   ← dex.config.issuer (or "<mgmt-host>/dex")
  ##   httpConfig.oidcConfigEndpoint ← authIssuer + "/.well-known/openid-configuration"
  ##   pkce/device domain      ← management.ingress.hosts[0].host
  ##   pkce/device endpoints   ← authIssuer + "/auth" | "/token" | "/device/code"
  ##
  ## STORAGE: StoreConfig.Engine is always overridden from postgres.enabled /
  ## mysql.enabled — no need to touch it here.
  ##
  config:
    ## @param management.config.dataStoreEncryptionKey AES-256 encryption key for the data store (base64, 32 bytes raw).
    ## Generate: head -c 32 /dev/urandom | base64
    ## REQUIRED — the management daemon refuses to start without a valid key.
    dataStoreEncryptionKey: ""

    ## @param management.config.stuns List of STUN server URLs.
    stuns: []

    turnConfig:
      ## @param management.config.turnConfig.turns List of TURN server entries.
      turns: []
      ## @param management.config.turnConfig.timeBasedCredentials Use time-based TURN credentials.
      timeBasedCredentials: false
      ## @param management.config.turnConfig.credentialsTTL TTL for TURN credentials.
      credentialsTTL: "12h"
      ## @param management.config.turnConfig.secret Shared secret for TURN.
      secret: "not-used"

    relay:
      ## @param management.config.relay.addresses Public relay addresses (rel:// URLs).
      ## Auto-derived from relay.publicHostname when empty.
      addresses: []
      ## @param management.config.relay.credentialsTTL TTL for relay session credentials.
      credentialsTTL: "24h"
      ## @param management.config.relay.secret Shared HMAC secret.
      ## REQUIRED — must match OZ_AUTH_SECRET on the relay pods.
      secret: ""

    signal:
      ## @param management.config.signal.proto Signal server protocol.
      proto: https
      ## @param management.config.signal.uri Signal server public URI (host:port).
      ## Auto-derived from management.ingress.hosts[0].host when empty.
      uri: ""

    ## Flow event ingestion endpoint that peers connect to when
    ## traffic logging is enabled (Settings → Network Traffic Logs in
    ## the dashboard). The management's `flow.FlowService` gRPC
    ## handler is registered on the same port as the ManagementService,
    ## so for typical self-hosted deployments this is the same host
    ## as the gRPC ingress (i.e. `management.ingressGrpc.hosts[0].host`).
    ##
    ## When uri is empty, the management binary falls back to
    ## Signal.URI to populate the per-peer FlowConfig — but Signal is
    ## a different gRPC server (signal.proto, not flow.proto), so
    ## peers silently fail to stream events until Flow is configured
    ## explicitly.
    flow:
      ## @param management.config.flow.proto Flow server protocol.
      proto: https
      ## @param management.config.flow.uri Flow ingestion URI (host:port).
      ## Auto-derived from management.ingressGrpc.hosts[0].host + ":443" when empty.
      uri: ""

    reverseProxy:
      ## @param management.config.reverseProxy.trustedHTTPProxies List of trusted HTTP proxy IPs.
      trustedHTTPProxies: []
      ## @param management.config.reverseProxy.trustedHTTPProxiesCount Number of trusted proxies to consume from X-Forwarded-For.
      trustedHTTPProxiesCount: 0
      ## @param management.config.reverseProxy.trustedPeers WireGuard peer CIDRs trusted as reverse proxies.
      trustedPeers:
        - "0.0.0.0/0"

    ## @param management.config.disableDefaultPolicy Disable the built-in allow-all default policy.
    disableDefaultPolicy: false

    httpConfig:
      ## @param management.config.httpConfig.address Internal HTTP listen address.
      address: "0.0.0.0:33071"
      ## @param management.config.httpConfig.authIssuer OIDC issuer URL.
      ## Auto-derived from dex.config.issuer (or "<mgmt-host>/dex") when empty.
      authIssuer: ""
      ## @param management.config.httpConfig.authAudience OIDC audience (client_id).
      authAudience: "openzro-dashboard"
      ## @param management.config.httpConfig.authUserIDClaim JWT claim used as the user ID.
      authUserIDClaim: "sub"
      ## @param management.config.httpConfig.oidcConfigEndpoint OIDC well-known discovery endpoint.
      ## Auto-derived from authIssuer when empty.
      oidcConfigEndpoint: ""
      ## @param management.config.httpConfig.idpSignKeyRefreshEnabled Refresh IdP signing keys automatically.
      idpSignKeyRefreshEnabled: true

    idpManagerConfig:
      ## @param management.config.idpManagerConfig.managerType IdP manager type (none | google | azure | okta | ...).
      managerType: "none"

    pkceAuthorizationFlow:
      providerConfig:
        ## @param management.config.pkceAuthorizationFlow.providerConfig.audience PKCE audience (must match authAudience).
        audience: "openzro-dashboard"
        ## @param management.config.pkceAuthorizationFlow.providerConfig.clientId PKCE client ID.
        clientId: "openzro-dashboard"
        ## @param management.config.pkceAuthorizationFlow.providerConfig.clientSecret PKCE client secret (empty for public clients).
        clientSecret: ""
        ## @param management.config.pkceAuthorizationFlow.providerConfig.domain Public management domain.
        ## Auto-derived from management.ingress.hosts[0].host when empty.
        domain: ""
        ## @param management.config.pkceAuthorizationFlow.providerConfig.authorizationEndpoint OIDC authorization endpoint.
        ## Auto-derived from authIssuer + "/auth" when empty.
        authorizationEndpoint: ""
        ## @param management.config.pkceAuthorizationFlow.providerConfig.tokenEndpoint OIDC token endpoint.
        ## Auto-derived from authIssuer + "/token" when empty.
        tokenEndpoint: ""
        ## @param management.config.pkceAuthorizationFlow.providerConfig.scope OIDC scopes to request.
        scope: "openid profile email offline_access"
        ## @param management.config.pkceAuthorizationFlow.providerConfig.redirectURLs Allowed redirect URLs. CLI loopback ports are included by default.
        redirectURLs:
          - "http://localhost:53000/"
          - "http://localhost:54000/"
          - "http://localhost:55000/"
        ## @param management.config.pkceAuthorizationFlow.providerConfig.useIDToken Use the ID token instead of the access token.
        useIDToken: false

    deviceAuthorizationFlow:
      ## @param management.config.deviceAuthorizationFlow.provider Device flow provider type.
      provider: "hosted"
      providerConfig:
        ## @param management.config.deviceAuthorizationFlow.providerConfig.audience Device flow audience.
        audience: "openzro-dashboard"
        ## @param management.config.deviceAuthorizationFlow.providerConfig.clientId Device flow client ID.
        clientId: "openzro-dashboard"
        ## @param management.config.deviceAuthorizationFlow.providerConfig.domain Public management domain (auto-derived).
        domain: ""
        ## @param management.config.deviceAuthorizationFlow.providerConfig.tokenEndpoint Token endpoint (auto-derived from pkce tokenEndpoint).
        tokenEndpoint: ""
        ## @param management.config.deviceAuthorizationFlow.providerConfig.deviceAuthEndpoint Device authorization endpoint (auto-derived from authIssuer).
        deviceAuthEndpoint: ""
        ## @param management.config.deviceAuthorizationFlow.providerConfig.scope OIDC scopes to request.
        scope: "openid profile email offline_access"
        ## @param management.config.deviceAuthorizationFlow.providerConfig.useIDToken Use the ID token instead of the access token.
        useIDToken: false

  ## @param management.existingConfigSecret Name of a pre-existing Secret containing management.json.
  ## When set, the chart skips generating the management Secret entirely and mounts
  ## this Secret directly. The Secret must have a key named `management.json`.
  ## Use with Vault, SealedSecrets, External Secrets Operator, or sops-encrypted values.
  ## All management.config.* values are ignored when this is set.
  existingConfigSecret: ""

  ## @param management.configmap [deprecated] Raw JSON escape hatch for management.json.
  ## When non-empty, this JSON string is used directly and management.config.* above is ignored.
  ## Only StoreConfig.Engine is still patched from postgres.enabled / mysql.enabled.
  ## Use only for fields not yet exposed as typed values. Prefer management.config.*.
  configmap: ""

  lifecycle: {} # Define lifecycle hooks (preStop, postStart) if needed.

  ## @param management.replicaCount Number of management pod replicas.
  ##
  replicaCount: 1

  ## PodDisruptionBudget — auto-enabled when replicaCount > 1.
  ## @param management.pdb.enabled Enable PodDisruptionBudget for management.
  ## @param management.pdb.minAvailable Minimum available pods during disruption.
  ## @param management.pdb.maxUnavailable Maximum unavailable pods (mutually exclusive with minAvailable).
  pdb:
    enabled: true
    minAvailable: 1
    maxUnavailable: ""

  ## @param management.strategy Deployment strategy.
  ## Default Recreate to avoid Multi-Attach errors on RWO PVCs
  ## (Longhorn, GP3, NFS-RWO, ...). Override to RollingUpdate only
  ## when running multi-replica with RWX storage AND embedded NATS
  ## clustering on (the management daemon's HA path).
  strategy:
    type: Recreate

  ## @param management.env Environment variables for the management pod.
  ##
  env: {}

  ## @param management.envRaw Raw environment variables for the management pod.
  ##
  envRaw: []
  #- name: OPENZRO_STORE_ENGINE_POSTGRES_DSN
  #  valueFrom:
  #    secretKeyRef:
  #      name: openzro-management
  #      key: postgresDSN

  ## @param management.envFromSecret Environment variables from secrets.
  ##
  envFromSecret: {}
  #ENV_VAR: secretName/secretKey

  image:
    ## @param management.image.repository Docker image repository for the management component.
    ##
    repository: ghcr.io/openzro/management

    ## @param management.image.pullPolicy Docker image pull policy.
    ##
    pullPolicy: IfNotPresent

    ## @param management.image.tag Docker image tag. Overrides the default tag.
    ##
    tag: ""

