        kind: ClusterIssuer
        ## @param signal.tls.certManager.issuerRef.name Existing (Cluster)Issuer name.
        name: ""

      ## @param signal.tls.certManager.duration Cert validity (default 90d).
      duration: 2160h
      ## @param signal.tls.certManager.renewBefore Renew lead time (default 15d).
      renewBefore: 360h

      ## @param signal.tls.certManager.dnsNames SANs (defaults to [signal.publicHostname]).
      dnsNames: []

      ## @param signal.tls.certManager.secretName Cert-manager-populated Secret name.
      ## Defaults to "<release>-signal-tls".
      secretName: ""

      ## @param signal.tls.certManager.privateKey Private key options for the Certificate.
      privateKey: {}

      ## @param signal.tls.certManager.annotations Extra annotations for the Certificate CRD.
      annotations: {}

  service:
    ## @param signal.service.type Service type for the signal component.
