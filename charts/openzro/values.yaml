## @section openZro Parameters

## @param global.namespace Kubernetes namespace for the openZro components.
##
global:
  namespace: ""

## @param nameOverride Override the name of the chart.
##
nameOverride: ""

## @param fullnameOverride Override the full name of the chart.
##
fullnameOverride: ""

## ============================================================
## External database — single-source-of-truth for the stack.
## ============================================================
##
## openZro talks to the management database AND Dex's database. Two
## drivers are supported, both as bring-your-own-database (the chart
## never installs a DBMS):
##
##   postgres  — recommended for HA/prod
##   mysql     — supported alternative for shops already running MySQL
##
## Pick AT MOST ONE; setting `enabled: true` on both is rejected by
## the chart at template time.
##
## When enabled, the chart wires the chosen DB into:
##   * management.StoreConfig.Engine in management.json
##   * Dex's storage (rendered into a Secret, consumed via
##     dex.configSecret.create=false + dex.configSecret.name=...)
##
## Both services hit the same SERVER but separate DATABASES
## (separation of concerns + per-service credentials via the
## optional `overrides` block).
##
## With BOTH disabled (default), each component falls back to its
## own sqlite — fine for dev/lab, NOT recommended for prod or any
## HA deployment (sqlite is single-process; multi-replica management
## or Dex on sqlite diverges silently).
##
## Migration: when switching engines or flipping enabled=true on an
## existing sqlite deployment, plan the data migration yourself
## (pg_dump / mysqldump → import). The chart does NOT migrate data.
##
postgres:
  ## @param postgres.enabled Use Postgres for management + Dex storage. Set to true for HA / prod.
  enabled: false

  ## @param postgres.host Postgres hostname or IP.
  host: ""

  ## @param postgres.port Postgres port.
  port: 5432

  ## @param postgres.sslMode Postgres SSL mode (require | verify-ca | verify-full | disable).
  sslMode: require

  ## @param postgres.username Postgres username with access to BOTH databases below.
  ## Override per-component via `postgres.overrides.<component>.username` if you
  ## prefer separate credentials per service.
  username: openzro

  ## @param postgres.password Postgres password. Vault-encrypt in real inventories.
  password: ""

  databases:
    ## @param postgres.databases.management Database for the management daemon.
    management: openzro
    ## @param postgres.databases.dex Database for the Dex IdP.
    dex: dex

  ## Per-component credential overrides — uncomment if you want a
  ## dedicated Postgres user for Dex (or any other component).
  ## Most teams keep a single user with access to both DBs.
  # overrides:
  #   dex:
  #     username: dex
  #     password: ""

mysql:
  ## @param mysql.enabled Use MySQL for management + Dex storage. Mutually exclusive with postgres.enabled.
  enabled: false

  ## @param mysql.host MySQL hostname or IP.
  host: ""

  ## @param mysql.port MySQL port.
  port: 3306

  ## @param mysql.tls MySQL TLS mode (true | false | skip-verify | preferred).
  ## Maps to the go-sql-driver `tls` query parameter. Use "preferred" if your
  ## server speaks TLS but you don't want to verify the certificate.
  tls: preferred

  ## @param mysql.username MySQL username with access to BOTH databases below.
  ## Override per-component via `mysql.overrides.<component>.username`.
  username: openzro

  ## @param mysql.password MySQL password. Vault-encrypt in real inventories.
  password: ""

  databases:
    ## @param mysql.databases.management Database for the management daemon.
    management: openzro
    ## @param mysql.databases.dex Database for the Dex IdP.
    dex: dex

  ## Per-component credential overrides.
  # overrides:
  #   dex:
  #     username: dex
  #     password: ""

## @section openZro Management

management:
  ## @param management.enabled Enable or disable openZro management component.
  ##
  enabled: true

  ## @param management.podCommand Define the arguments for the management pod.
  ##
  podCommand:
    args:
      - --port=80
      - --log-file=console
      - --log-level=info
      - --disable-anonymous-metrics=false
      - --single-account-mode-domain=openzro.selfhosted
      - --dns-domain=openzro.selfhosted

  ## @param management.configmap Inline JSON management.json.
  ##
  ## REQUIRED OVERRIDES per deployment:
  ##   - DataStoreEncryptionKey  — generate with:
  ##       head -c 32 /dev/urandom | base64
  ##   - HttpConfig.AuthIssuer / OIDCConfigEndpoint — point at your
  ##     Dex hostname (e.g. https://dex.<domain>)
  ##   - Signal.URI — your dashboard hostname over HTTPS
  ##   - Relay.Addresses — your relay LoadBalancer's public hostname
  ##   - Relay.Secret — share with relay's OZ_AUTH_SECRET env var
  ##
  ## STORAGE WARNING — `StoreConfig.Engine: sqlite` is convenient for
  ## single-replica labs but inappropriate for production:
  ##   - SQLite + RWO PVC = 1 management replica MAX (no HA)
  ##   - Backup/restore is harder than postgres pg_dump
  ##   - For prod, switch to:
  ##       "StoreConfig": { "Engine": "postgres" }
  ##     and set OPENZRO_STORE_ENGINE_POSTGRES_DSN via management.envRaw.
  ##
  ## The defaults below match the layout the openzro/openzro lab uses
  ## (single host openzro.example.com, dex on dex.<domain>, relay on
  ## relay.<domain>). See docs/operator/k8s-deployment-guide.md for
  ## the per-field reference.
  configmap: |
    {
        "Stuns": [],
        "TURNConfig": {
            "Turns": [],
            "TimeBasedCredentials": false,
            "CredentialsTTL": "12h",
            "Secret": "not-used"
        },
        "Relay": {
            "Addresses": ["rel://relay.openzro.example.com:33080"],
            "CredentialsTTL": "24h",
            "Secret": "REPLACE_WITH_RELAY_OZ_AUTH_SECRET"
        },
        "Signal": {
            "Proto": "https",
            "URI": "openzro.example.com:443"
        },
        "ReverseProxy": {
            "TrustedHTTPProxies": [],
            "TrustedHTTPProxiesCount": 0,
            "TrustedPeers": ["0.0.0.0/0"]
        },
        "DisableDefaultPolicy": false,
        "DataStoreEncryptionKey": "REPLACE_WITH_BASE64_32_BYTES",
        "StoreConfig": {
            "Engine": "sqlite"
        },
        "HttpConfig": {
            "Address": "0.0.0.0:33071",
            "AuthIssuer": "https://openzro.example.com/dex",
            "AuthAudience": "openzro-dashboard",
            "AuthUserIDClaim": "sub",
            "OIDCConfigEndpoint": "https://openzro.example.com/dex/.well-known/openid-configuration",
            "IdpSignKeyRefreshEnabled": true
        },
        "IdpManagerConfig": {
            "ManagerType": "none"
        },
        "PKCEAuthorizationFlow": {
            "ProviderConfig": {
                "Audience": "openzro-dashboard",
                "ClientID": "openzro-dashboard",
                "ClientSecret": "",
                "Domain": "openzro.example.com",
                "AuthorizationEndpoint": "https://openzro.example.com/dex/auth",
                "TokenEndpoint": "https://openzro.example.com/dex/token",
                "Scope": "openid profile email offline_access",
                "RedirectURLs": [
                    "http://localhost:53000/",
                    "http://localhost:54000/",
                    "http://localhost:55000/"
                ],
                "UseIDToken": false
            }
        },
        "DeviceAuthorizationFlow": {
            "Provider": "hosted",
            "ProviderConfig": {
                "Audience": "openzro-dashboard",
                "ClientID": "openzro-dashboard",
                "Domain": "openzro.example.com",
                "TokenEndpoint": "https://openzro.example.com/dex/token",
                "DeviceAuthEndpoint": "https://openzro.example.com/dex/device/code",
                "Scope": "openid profile email offline_access",
                "UseIDToken": false
            }
        }
    }

  lifecycle: {} # Define lifecycle hooks (preStop, postStart) if needed.

  ## @param management.replicaCount Number of management pod replicas.
  ##
  replicaCount: 1

  ## @param management.strategy Deployment strategy.
  ## Default Recreate to avoid Multi-Attach errors on RWO PVCs
  ## (Longhorn, GP3, NFS-RWO, ...). Override to RollingUpdate only
  ## when running multi-replica with RWX storage AND embedded NATS
  ## clustering on (the management daemon's HA path).
  strategy:
    type: Recreate

  ## @param management.env Environment variables for the management pod.
  ##
  env: {}

  ## @param management.envRaw Raw environment variables for the management pod.
  ##
  envRaw: []
  #- name: OPENZRO_STORE_ENGINE_POSTGRES_DSN
  #  valueFrom:
  #    secretKeyRef:
  #      name: openzro-management
  #      key: postgresDSN

  ## @param management.envFromSecret Environment variables from secrets.
  ##
  envFromSecret: {}
  #ENV_VAR: secretName/secretKey

  image:
    ## @param management.image.repository Docker image repository for the management component.
    ##
    repository: ghcr.io/openzro/management

    ## @param management.image.pullPolicy Docker image pull policy.
    ##
    pullPolicy: IfNotPresent

    ## @param management.image.tag Docker image tag. Overrides the default tag.
    ##
    tag: ""

  ## @param management.imagePullSecrets Docker registry credentials for pulling the management image.
  ##
  imagePullSecrets: []

  serviceAccount:
    ## @param management.serviceAccount.create Whether to create a service account.
    ##
    create: true

    ## @param management.serviceAccount.annotations Annotations for the service account.
    ##
    annotations: {}

    ## @param management.serviceAccount.name Name of the service account to use.
    ##
    name: ""

  ## @param management.deploymentAnnotations Annotations for the management deployment.
  ##
  deploymentAnnotations: {}

  ## @param management.podAnnotations Annotations for the management pod(s).
  ##
  podAnnotations: {}

  ## @param management.podSecurityContext Security context for the management pod(s).
  ##
  podSecurityContext: {}
  # fsGroup: 2000

  ## @param management.securityContext Security context for the management container.
  ##
  securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

  ## @param management.useBackwardsGrpcService Use the backwards-compatible GRPC service.
  useBackwardsGrpcService: false

  metrics:
    ## @param signal.metrics.enabled enables/disables metrics
    ##
    enabled: false
    ## @param signal.metrics.port target metrics port
    ##
    port: 9090

  ## @param management.containerPort Container port for the management service.
  ##
  containerPort: 80

  service:
    ## @param management.service.type Service type for the management component.
    ##
    type: ClusterIP

    ## @param management.service.port Port for the management service.
    ##
    port: 80

    ## @param management.service.name Name for the management service port.
    ##
    name: http

    ## @param management.service.externalIPs External IPs for the management service.
    ##
    externalIPs: []

    ## @param management.service.annotations Annotations for the management service.
    ##
    annotations: {}

  ## @param management.grpcContainerPort Container port for the management service.
  ##
  grpcContainerPort: 33073

  serviceGrpc:
    ## @param management.serviceGrpc.type Service type for the management GRPC component.
    ##
    type: ClusterIP

    ## @param management.serviceGrpc.port Port for the management GRPC service.
    ##
    port: 33073

    ## @param management.serviceGrpc.name Name for the management GRPC service port.
    ##
    name: grpc

    ## @param management.serviceGrpc.externalIPs External IPs for the management GRPC service.
    ##
    externalIPs: []

    ## @param management.serviceGrpc.annotations Annotations for the management service.
    ##
    annotations: {}

  ingress:
    ## @param management.ingress.enabled Enable or disable ingress for the management component.
    ##
    enabled: false

    ## @param management.ingress.className Ingress class name.
    ##
    className: ""

    ## @param management.ingress.annotations Annotations for the ingress resource.
    ##
    annotations: {}

    hosts:
      ## @param management.ingress.hosts[0].host Host for the ingress.
      ##
      - host: example.com
        paths:
          ## @param management.ingress.hosts[0].paths[0].path Path for the ingress.
          ##
          - path: /
            ## @param management.ingress.hosts[0].paths[0].pathType Path type for the ingress.
            ##
            pathType: ImplementationSpecific

    ## @param management.ingress.tls TLS settings for the ingress.
    ##
    tls: []
    #  - secretName: chart-example-tls
    #    hosts:
    #      - chart-example.local

  ingressGrpc:
    ## @param management.ingressGrpc.enabled Enable or disable GRPC ingress.
    ##
    enabled: false

    ## @param management.ingressGrpc.className Ingress class name for GRPC.
    ##
    className: ""

    ## @param management.ingressGrpc.annotations Annotations for the GRPC ingress resource.
    ##
    annotations: {}

    hosts:
      ## @param management.ingressGrpc.hosts[0].host Host for GRPC ingress.
      ##
      - host: example.com
        paths:
          ## @param management.ingressGrpc.hosts[0].paths[0].path Path for GRPC ingress.
          ##
          - path: /
            ## @param management.ingressGrpc.hosts[0].paths[0].pathType Path type for GRPC ingress.
            ##
            pathType: ImplementationSpecific

    ## @param management.ingressGrpc.tls TLS settings for GRPC ingress.
    ##
    tls: []

  ## @param management.resources Resource requests and limits for the management pod.
  ##
  resources: {}
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

  ## @param management.nodeSelector Node selector for scheduling the management pod.
  ##
  nodeSelector: {}

  ## @param management.tolerations Tolerations for scheduling the management pod.
  ##
  tolerations: []

  ## @param management.affinity Affinity rules for scheduling the management pod.
  ##
  affinity: {}

  persistentVolume:
    ## @param management.persistentVolume.enabled Enable or disable persistent volume for the management pod.
    ##
    enabled: true

    ## @param management.persistentVolume.accessModes Access modes for the persistent volume.
    ##
    accessModes:
      - ReadWriteOnce

    ## @param management.persistentVolume.size Size of the persistent volume.
    ##
    size: 10Mi

    ## @param management.persistentVolume.storageClass Storage Class of the persistent volume.
    ##
    storageClass: null

    ## @param management.persistentVolume.existingPVName The name of an existing persistent volume which should be claimed and used for the management pod.
    ##
    existingPVName: ""

  ## @param management.livenessProbe for the management component.
  ##
  livenessProbe:
    failureThreshold: 3
    initialDelaySeconds: 15
    periodSeconds: 10
    timeoutSeconds: 3
    tcpSocket:
      port: http

  ## @param management.readinessProbe for the management component.
  ##
  readinessProbe:
    failureThreshold: 3
    initialDelaySeconds: 15
    periodSeconds: 10
    timeoutSeconds: 3
    tcpSocket:
      port: http

  ## @param management.volumeMounts Volume mounts for the management pod.
  volumeMounts: []
  # - name: tmp
  #   mountPath: /tmp

  ## @param management.volumes volumes for the management pod.
  volumes: []
  # - name: tmp
  #   emptyDir: {}

