  ## TLS termination on the signal binary itself. Necessary when running
  ## under ingress-nginx (community), which has a long-standing bug forwarding
  ## gRPC server-streaming initial metadata — peers never receive the
  ## `x-wiretrustee-peer-registered` header and the connection times out.
  ## Issue #5366 (open since 2020, project archived 2026-03 with no fix).
  ##
  ## Setup: signal.service.type=LoadBalancer + signal.tls.enabled=true +
  ## DNS for signal.publicHostname pointing at the LB external IP. Operators
