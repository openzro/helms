suite: secret management
templates:
  - management-secret.yaml
  - management-db-secret.yaml
  - management-identity-secret.yaml
  - management-deployment.yaml

tests:
  # ── management.json secret rendering ────────────────────────────────────────

  - it: management-secret renders when no existingConfigSecret
    template: management-secret.yaml
    set:
      ingress.host: vpn.example.com
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Secret
      - equal:
          path: type
          value: Opaque

  - it: management-secret is suppressed when existingConfigSecret is set
    template: management-secret.yaml
    set:
      ingress.host: vpn.example.com
      management.existingConfigSecret: my-external-secret
    asserts:
      - hasDocuments:
          count: 0

  - it: management-secret contains management.json key
    template: management-secret.yaml
    set:
      ingress.host: vpn.example.com
    asserts:
      - isNotNull:
          path: stringData["management.json"]

  - it: management-secret auto-derives dexIssuer from ingress.host when no dex issuer is set
    template: management-secret.yaml
    set:
      ingress.host: vpn.example.com
      dex.config.issuer: ""
    asserts:
      - matchRegex:
          path: stringData["management.json"]
          pattern: '"AuthIssuer":"https://vpn.example.com/dex"'

  - it: management-secret uses explicit dex.config.issuer when set (takes priority over ingress.host)
    template: management-secret.yaml
    set:
      ingress.host: vpn.example.com
      dex.config.issuer: https://sso.corp.example.com/dex
    asserts:
      - matchRegex:
          path: stringData["management.json"]
          pattern: '"AuthIssuer":"https://sso.corp.example.com/dex"'

  # ── Deployment mounts correct secret volume ──────────────────────────────────

  - it: management deployment mounts chart-managed secret by default
    template: management-deployment.yaml
    set:
      ingress.host: vpn.example.com
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: config
            secret:
              secretName: RELEASE-NAME-openzro-management

  - it: management deployment mounts existingConfigSecret when set
    template: management-deployment.yaml
    set:
      ingress.host: vpn.example.com
      management.existingConfigSecret: my-external-secret
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: config
            secret:
              secretName: my-external-secret

  # ── DB password injection — never plain text, always secretKeyRef ────────────

  - it: DB password is injected via secretKeyRef NOT plain env value (postgres)
    template: management-deployment.yaml
    set:
      ingress.host: vpn.example.com
      postgres.enabled: true
      postgres.host: pg.example.com
      postgres.password: super-secret
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: OPENZRO_DB_PASSWORD
            valueFrom:
              secretKeyRef:
                name: RELEASE-NAME-openzro-db
                key: password

  - it: OPENZRO_DB_PASSWORD plain value is never rendered in env (postgres)
    template: management-deployment.yaml
    set:
      ingress.host: vpn.example.com
      postgres.enabled: true
      postgres.password: super-secret
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: OPENZRO_DB_PASSWORD
            value: super-secret

  - it: DSN uses substitution placeholder not literal password (postgres)
    template: management-deployment.yaml
    set:
      ingress.host: vpn.example.com
      postgres.enabled: true
      postgres.host: pg.example.com
      postgres.password: super-secret
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: OPENZRO_STORE_ENGINE_POSTGRES_DSN
            value: "host=pg.example.com port=5432 dbname=openzro user=openzro password=$(OPENZRO_DB_PASSWORD) sslmode=require"

  - it: references existingSecret when postgres.existingSecret is set
    template: management-deployment.yaml
    set:
      ingress.host: vpn.example.com
      postgres.enabled: true
      postgres.host: pg.example.com
      postgres.existingSecret: my-pg-secret
      postgres.existingSecretPasswordKey: pgpassword
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: OPENZRO_DB_PASSWORD
            valueFrom:
              secretKeyRef:
                name: my-pg-secret
                key: pgpassword

  - it: DB password is injected via secretKeyRef NOT plain env value (mysql)
    template: management-deployment.yaml
    set:
      ingress.host: vpn.example.com
      mysql.enabled: true
      mysql.host: mysql.example.com
      mysql.password: super-secret
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: OPENZRO_DB_PASSWORD
            valueFrom:
              secretKeyRef:
                name: RELEASE-NAME-openzro-db
                key: password

  # ── Chart-managed DB secret ──────────────────────────────────────────────────

  - it: DB secret is NOT rendered when no DB is enabled
    template: management-db-secret.yaml
    set:
      ingress.host: vpn.example.com
    asserts:
      - hasDocuments:
          count: 0

  - it: DB secret is rendered when postgres.enabled and no existingSecret
    template: management-db-secret.yaml
    set:
      ingress.host: vpn.example.com
      postgres.enabled: true
      postgres.password: my-password
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Secret

  - it: DB secret is NOT rendered when postgres.existingSecret is set
    template: management-db-secret.yaml
    set:
      ingress.host: vpn.example.com
      postgres.enabled: true
      postgres.existingSecret: my-pg-secret
    asserts:
      - hasDocuments:
          count: 0
