name: Release Helm Chart

on:
  push:
    paths:
      # Bumps em qualquer um destes Chart.yaml disparam release.
      # `charts/openzro-operator/Chart.yaml` so passou a existir
      # depois do flatten (antes era charts/openzro-operator/
      # kubernetes-operator/Chart.yaml, fora do alcance do
      # chart-releaser).
      - 'charts/openzro/Chart.yaml'
      - 'charts/openzro-operator/Chart.yaml'
      - 'charts/openzro-operator-config/Chart.yaml'
    branches:
      - main
  workflow_dispatch:
    # Manual re-run path — useful when CI infra (deps, registry
    # auth) changes without bumping a chart version.

jobs:
  chart-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Register subchart helm repos
        # chart-releaser-action's internal `cr package` invokes
        # `helm package` which requires every dependency repo to be
        # registered with the local helm client. Every entry in
        # charts/openzro/Chart.yaml's `dependencies:` block needs a
        # matching `helm repo add` here — adding a new subchart
        # without updating this list makes the next release run
        # fail with `no repository definition for <url>`.
        run: |
          helm repo add dex https://charts.dexidp.io
          helm repo add nats https://nats-io.github.io/k8s/helm/charts/
          helm repo update

      - name: Run chart-releaser
        # Publishes to the gh-pages branch of this repo, which is
        # served at https://openzro.github.io/helms — operators add
        # with: `helm repo add openzro https://openzro.github.io/helms`
        uses: helm/chart-releaser-action@v1.7.0
        with:
          # Idempotent re-runs: when a release for this chart+version
          # already exists, skip the upload instead of failing 422.
          # Lets us retry CI without nuking the GitHub Release first.
          skip_existing: true
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
          CR_RELEASE_NAME_TEMPLATE: "helm-{{ .Name }}-v{{ .Version }}"

      # Mirror to ghcr.io as OCI artifacts for the modern install
      # path: `helm install foo oci://ghcr.io/openzro/charts/openzro
      # --version 2.0.0-alpha.1`. Both paths coexist; OCI uses the
      # GITHUB_TOKEN that already has packages:write on the org.
      - name: Login to ghcr.io for OCI push
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u "$GITHUB_ACTOR" --password-stdin
        continue-on-error: true

      # OCI publish on tag push currently fails because charts/openzro
      # auto-links to the openzro/openzro repo (GitHub package
      # auto-linking by name match — there's a sibling `openzro` repo
      # in the org), and the helms repo's GITHUB_TOKEN can't write
      # to a package owned by a different repo. Bootstrap was done
      # manually via PAT (`helm push oci://ghcr.io/openzro/charts`),
      # so the packages exist; CI just can't update them on
      # subsequent tags. The gh-pages publish above is the canonical
      # path until we either rename the OCI namespace
      # (e.g. ghcr.io/openzro/helmcharts/) or transfer the package
      # ownership to openzro/helms.
      - name: Package and push charts as OCI artifacts
        continue-on-error: true
        run: |
          set -euo pipefail
          mkdir -p .cr-release-packages
          # Discover any chart by Chart.yaml location — handles the
          # fork structural quirk where `charts/openzro-operator`
          # nests its real chart at `charts/openzro-operator/kubernetes-operator/`.
          while IFS= read -r chart_yaml; do
            chart_dir="$(dirname "$chart_yaml")"
            echo "Packaging $chart_dir"
            helm dependency update "$chart_dir"
            helm package "$chart_dir" --destination .cr-release-packages/
          done < <(find charts -mindepth 2 -maxdepth 3 -name Chart.yaml)

          for tgz in .cr-release-packages/*.tgz; do
            echo "Pushing $tgz to oci://ghcr.io/openzro/charts"
            helm push "$tgz" oci://ghcr.io/openzro/charts
          done
