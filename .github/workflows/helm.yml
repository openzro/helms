name: Release Helm Chart

on:
  push:
    paths:
      # update this file to trigger helm chart release
      - 'charts/openzro-operator/Chart.yaml'
      - 'charts/openzro/Chart.yaml'
    branches:
      - main

jobs:
  chart-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Register subchart helm repos
        # chart-releaser-action's internal `cr package` invokes
        # `helm package` which requires every dependency repo to be
        # registered with the local helm client. ADR-0008 added the
        # dexidp/dex subchart dependency to charts/openzro/Chart.yaml,
        # so register it here before chart-releaser runs.
        run: |
          helm repo add dex https://charts.dexidp.io
          helm repo update

      - name: Run chart-releaser
        # Publishes to the gh-pages branch of this repo, which is
        # served at https://openzro.github.io/helms — operators add
        # with: `helm repo add openzro https://openzro.github.io/helms`
        uses: helm/chart-releaser-action@v1.7.0
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
          CR_RELEASE_NAME_TEMPLATE: "helm-{{ .Name }}-v{{ .Version }}"

      # Mirror to ghcr.io as OCI artifacts for the modern install
      # path: `helm install foo oci://ghcr.io/openzro/charts/openzro
      # --version 2.0.0-alpha.1`. Both paths coexist; OCI uses the
      # GITHUB_TOKEN that already has packages:write on the org.
      - name: Login to ghcr.io for OCI push
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u "$GITHUB_ACTOR" --password-stdin

      - name: Package and push charts as OCI artifacts
        run: |
          set -euo pipefail
          mkdir -p .cr-release-packages
          # Discover any chart by Chart.yaml location — handles the
          # fork structural quirk where `charts/openzro-operator`
          # nests its real chart at `charts/openzro-operator/kubernetes-operator/`.
          while IFS= read -r chart_yaml; do
            chart_dir="$(dirname "$chart_yaml")"
            echo "Packaging $chart_dir"
            helm dependency update "$chart_dir"
            helm package "$chart_dir" --destination .cr-release-packages/
          done < <(find charts -mindepth 2 -maxdepth 3 -name Chart.yaml)

          for tgz in .cr-release-packages/*.tgz; do
            echo "Pushing $tgz to oci://ghcr.io/openzro/charts"
            helm push "$tgz" oci://ghcr.io/openzro/charts
          done
