# ============================================================
# openZro — Secret management examples
# ============================================================
#
# This file documents all Secret resources the chart needs and how to
# supply them. Three strategies are shown for each sensitive value:
#
#   A) Inline in values.yaml  — chart creates the Secret (dev/lab only)
#   B) Pre-created Secret     — you own the Secret, chart references it
#   C) External Secrets Operator / Vault / SealedSecrets (production)
#
# NEVER commit strategy A with real values to git.
# Strategies B and C are both safe for production.
# ============================================================

# ─────────────────────────────────────────────────────────────────────
# 1. management.json — encryption key + relay HMAC secret
#
#    DataStoreEncryptionKey and Relay.Secret live inside management.json
#    which the chart now renders as a Kubernetes Secret (not a ConfigMap).
#
#    Strategy B: create the Secret yourself and point the chart at it.
#
#    Step 1 — generate values:
#      export ENCRYPTION_KEY=$(head -c 32 /dev/urandom | base64)
#      export RELAY_SECRET=$(head -c 32 /dev/urandom | base64 | tr -d '=')
#
#    Step 2 — create the Secret (example below is a minimal management.json):
# ─────────────────────────────────────────────────────────────────────
---
apiVersion: v1
kind: Secret
metadata:
  name: openzro-management-config   # must match management.existingConfigSecret
  namespace: openzro
type: Opaque
stringData:
  # Full management.json — all fields required.
  # Replace every REPLACE_WITH_* placeholder before applying.
  management.json: |
    {
      "Stuns": [],
      "TURNConfig": {
        "Turns": [],
        "TimeBasedCredentials": false,
        "CredentialsTTL": "12h",
        "Secret": "not-used"
      },
      "Relay": {
        "Addresses": ["rel://relay.vpn.example.com:33080"],
        "CredentialsTTL": "24h",
        "Secret": "REPLACE_WITH_RELAY_SECRET"
      },
      "Signal": {
        "Proto": "https",
        "URI": "vpn.example.com:443"
      },
      "ReverseProxy": {
        "TrustedHTTPProxies": [],
        "TrustedHTTPProxiesCount": 0,
        "TrustedPeers": ["0.0.0.0/0"]
      },
      "DisableDefaultPolicy": false,
      "DataStoreEncryptionKey": "REPLACE_WITH_BASE64_32_BYTES",
      "StoreConfig": {"Engine": "sqlite"},
      "HttpConfig": {
        "Address": "0.0.0.0:33071",
        "AuthIssuer": "https://vpn.example.com/dex",
        "AuthAudience": "openzro-dashboard",
        "AuthUserIDClaim": "sub",
        "OIDCConfigEndpoint": "https://vpn.example.com/dex/.well-known/openid-configuration",
        "IdpSignKeyRefreshEnabled": true
      },
      "IdpManagerConfig": {"ManagerType": "none"},
      "PKCEAuthorizationFlow": {
        "ProviderConfig": {
          "Audience": "openzro-dashboard",
          "ClientID": "openzro-dashboard",
          "ClientSecret": "",
          "Domain": "vpn.example.com",
          "AuthorizationEndpoint": "https://vpn.example.com/dex/auth",
          "TokenEndpoint": "https://vpn.example.com/dex/token",
          "Scope": "openid profile email offline_access",
          "RedirectURLs": [
            "http://localhost:53000/",
            "http://localhost:54000/",
            "http://localhost:55000/"
          ],
          "UseIDToken": false
        }
      },
      "DeviceAuthorizationFlow": {
        "Provider": "hosted",
        "ProviderConfig": {
          "Audience": "openzro-dashboard",
          "ClientID": "openzro-dashboard",
          "Domain": "vpn.example.com",
          "TokenEndpoint": "https://vpn.example.com/dex/token",
          "DeviceAuthEndpoint": "https://vpn.example.com/dex/device/code",
          "Scope": "openid profile email offline_access",
          "UseIDToken": false
        }
      }
    }

# values.yaml snippet to use this Secret:
#
#   management:
#     existingConfigSecret: openzro-management-config


# ─────────────────────────────────────────────────────────────────────
# 2. Postgres password
#
#    Strategy B: own Secret, chart references via secretKeyRef.
#
#    Generate: openssl rand -base64 24
# ─────────────────────────────────────────────────────────────────────
---
apiVersion: v1
kind: Secret
metadata:
  name: openzro-postgres             # must match postgres.existingSecret
  namespace: openzro
type: Opaque
stringData:
  password: "REPLACE_WITH_POSTGRES_PASSWORD"

# values.yaml snippet:
#
#   postgres:
#     enabled: true
#     host: pg.example.com
#     username: openzro
#     existingSecret: openzro-postgres
#     existingSecretPasswordKey: password   # default, can omit


# ─────────────────────────────────────────────────────────────────────
# 3. MySQL password
#
#    Same pattern as Postgres — mutually exclusive, pick one.
# ─────────────────────────────────────────────────────────────────────
---
apiVersion: v1
kind: Secret
metadata:
  name: openzro-mysql                # must match mysql.existingSecret
  namespace: openzro
type: Opaque
stringData:
  password: "REPLACE_WITH_MYSQL_PASSWORD"

# values.yaml snippet:
#
#   mysql:
#     enabled: true
#     host: mysql.example.com
#     username: openzro
#     existingSecret: openzro-mysql
#     existingSecretPasswordKey: password   # default, can omit


# ─────────────────────────────────────────────────────────────────────
# 4. MaxMind GeoLite2 license key (optional)
#
#    Free license key: https://www.maxmind.com/en/geolite2/signup
# ─────────────────────────────────────────────────────────────────────
---
apiVersion: v1
kind: Secret
metadata:
  name: openzro-maxmind              # must match management.geoLite.licenseKey.existingSecret
  namespace: openzro
type: Opaque
stringData:
  licenseKey: "REPLACE_WITH_MAXMIND_LICENSE_KEY"

# values.yaml snippet:
#
#   management:
#     geoLite:
#       licenseKey:
#         existingSecret: openzro-maxmind
#         existingSecretKey: licenseKey    # default, can omit


# ─────────────────────────────────────────────────────────────────────
# 5. Relay inter-pod auth secret (HA mode only)
#
#    Auto-generated on first install when left empty — no action needed
#    for most installs. Set explicitly when GitOps requires deterministic
#    state or when running relay.replicaCount > 1 across namespaces.
# ─────────────────────────────────────────────────────────────────────
---
apiVersion: v1
kind: Secret
metadata:
  name: openzro-relay-auth           # must match relay.cluster.authSecret.existingSecret
  namespace: openzro
type: Opaque
stringData:
  authSecret: "REPLACE_WITH_RELAY_CLUSTER_HMAC_SECRET"

# values.yaml snippet:
#
#   relay:
#     cluster:
#       authSecret:
#         existingSecret: openzro-relay-auth
#         existingSecretKey: authSecret    # default, can omit


# ─────────────────────────────────────────────────────────────────────
# 6. Strategy C — External Secrets Operator (ESO) example
#
#    Sync secrets from AWS Secrets Manager / Vault / GCP Secret Manager
#    into Kubernetes Secrets automatically. The chart then references
#    them the same way as Strategy B.
# ─────────────────────────────────────────────────────────────────────
---
# Requires: External Secrets Operator installed in the cluster
# https://external-secrets.io
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: openzro-management-config
  namespace: openzro
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend        # your SecretStore / ClusterSecretStore
    kind: ClusterSecretStore
  target:
    name: openzro-management-config   # the K8s Secret the chart will consume
    creationPolicy: Owner
  data:
    - secretKey: management.json
      remoteRef:
        key: openzro/management       # path in Vault / AWS SM / GCP SM
        property: management.json
